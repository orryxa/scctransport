<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trip Management System - Form 3107</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        /* Hide scrollbars but keep scrolling functional */
        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }
        
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
            padding-bottom: 60px;
        }

        .action-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            justify-content: space-between;
        }

        .search-container {
            flex: 2;
            position: relative;
            min-width: 250px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #7f8c8d;
        }

        .search-clear {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #95a5a6;
            display: none;
            font-size: 18px;
            background: none;
            border: none;
        }

        .search-clear:hover {
            color: #e74c3c;
        }

        .search-result-count {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 8px;
            display: none;
        }

        .btn-refresh {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh:hover {
            background: #1e3c72;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 82, 152, 0.3);
        }

        .btn-add {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        @media (max-width: 768px) {
            .action-bar {
                flex-direction: column;
                gap: 12px;
            }
            
            .button-group {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                width: 100%;
            }
            
            .btn-refresh, .btn-add {
                width: 100%;
                justify-content: center;
                padding: 14px;
                font-size: 16px;
            }
            
            .search-container {
                width: 100%;
                order: 3;
            }
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e1e8ed;
            background: white;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #1e3c72;
            border-bottom: 2px solid #e1e8ed;
            font-size: 14px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e1e8ed;
            color: #34495e;
            font-size: 14px;
        }

        tr:hover {
            background: #f8fafc;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-view {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-view:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-update {
            background: #f39c12;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-update:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .btn-view, .btn-update {
                padding: 10px 14px;
                font-size: 13px;
                flex: 1;
                justify-content: center;
            }
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-delete:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .btn-submit {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        /* Modal Styles - Enhanced for mobile with padding and scroll */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-content {
            background-color: white;
            margin: 0;
            padding: 0;
            border-radius: 0;
            width: 100%;
            min-height: 100vh;
            animation: slideUp 0.3s ease;
        }

        /* Enhanced mobile view for Add Trip Modal */
        #addTripModal .modal-content {
            padding: 5px;
        }

        #addTripModal .modal-body {
            padding: 5px;
            max-height: calc(100vh - 60px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #addTripModal iframe {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
            border-radius: 12px;
            display: block;
        }

        @media (max-width: 768px) {
            #addTripModal .modal-content {
                padding: 5px;
            }
            
            #addTripModal .modal-body {
                padding: 5px;
            }
            
            #addTripModal .modal-header {
                padding: 15px;
            }
            
            #addTripModal .modal-header h2 {
                font-size: 1.2rem;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            transform: scale(1.1);
        }

        .modal-body {
            padding: 25px;
            max-height: calc(100vh - 70px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-footer {
            padding: 15px 25px;
            border-top: 1px solid #e1e8ed;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: sticky;
            bottom: 0;
            background: white;
        }

        .alert-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .alert-content {
            background: white;
            border-radius: 20px;
            padding: 0;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .alert-header {
            padding: 20px;
            border-radius: 20px 20px 0 0;
            font-size: 24px;
        }

        .alert-header.success {
            background: #27ae60;
            color: white;
        }

        .alert-header.error {
            background: #e74c3c;
            color: white;
        }

        .alert-header.warning {
            background: #f39c12;
            color: white;
        }

        .alert-body {
            padding: 30px 20px;
            font-size: 16px;
            color: #333;
        }

        .alert-footer {
            padding: 15px 20px;
            border-top: 1px solid #e1e8ed;
        }

        .alert-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
        }

        .details-table tr {
            border-bottom: 1px solid #e1e8ed;
        }

        .details-table td {
            padding: 12px;
        }

        .details-table td:first-child {
            font-weight: 600;
            width: 35%;
            background: #f8fafc;
            color: #1e3c72;
        }

        .details-table td:last-child {
            width: 65%;
            color: #34495e;
            word-break: break-word;
        }

        .update-form {
            display: grid;
            gap: 20px;
        }

        .form-row {
            display: grid;
            gap: 10px;
        }

        .form-row label {
            font-weight: 600;
            color: #1e3c72;
            font-size: 14px;
        }

        .form-row label .required {
            color: #e74c3c;
        }

        .form-row input, .form-row textarea, .form-row select {
            padding: 10px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-row input:focus, .form-row select:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .form-row input[readonly] {
            background: #f8fafc;
            cursor: not-allowed;
        }

        .file-link {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }

        .file-link:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2a5298;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .back-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #7f8c8d;
            transform: translateX(-5px);
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .current-file {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .btn-file-view {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            margin: 2px;
        }

        .calculation-hint {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <h2>🚛 Trip Management System - Form 3107</h2>
            <p>Manage Trip Records, Distance & Diesel Cost Calculations</p>
        </div>

        <div class="content">
            <!-- Page 1: View All Trips -->
            <div id="page1" class="page active">
                <div class="action-bar">
                    <div class="button-group">
                        <button class="btn-refresh" onclick="loadTrips()">🔄 Refresh</button>
                        <button class="btn-add" onclick="openAddTripModal()">➕ Add New Trip</button>
                    </div>
                    <div class="search-container">
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="searchInput" placeholder="Search by LR No, Destination or Distributor...">
                            <button class="search-clear" id="searchClear" onclick="clearSearch()">✖</button>
                        </div>
                        <div class="search-result-count" id="searchResultCount"></div>
                    </div>
                </div>
                <div class="table-container">
                    <table id="tripsTable">
                        <thead>
                            <tr><th>Sr. No</th><th>Date</th><th>LR No</th><th>Distributor</th><th>Amount (₹)</th><th>Action</th></tr>
                        </thead>
                        <tbody id="tripsTableBody"><tr><td colspan="6" class="no-data">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Page 2: Update Trip -->
        <div id="page2" class="page">
            <button class="back-btn" onclick="goToPage1()">← Back to Trip List</button>
            <div class="table-container">
                <div id="updateFormContainer" style="padding: 20px;"></div>
            </div>
        </div>
    </div>

    <!-- View Details Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>📄 Trip Details</h2><button class="close-modal" onclick="closeModal()">&times;</button></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer"><button class="btn-delete" onclick="confirmDeleteTrip()">🗑 Delete Trip</button><button class="btn-cancel" onclick="closeModal()">Close</button></div>
        </div>
    </div>

    <!-- Add Trip Modal (full width with enhanced mobile padding) -->
    <div id="addTripModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>➕ Add New Trip</h2><button class="close-modal" onclick="closeAddTripModal()">&times;</button></div>
            <div class="modal-body"><iframe id="tripFormIframe" src="Form3140.html" title="Trip Entry Form"></iframe></div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alertModal" class="alert-modal"><div class="alert-content"><div class="alert-header" id="alertHeader"></div><div class="alert-body" id="alertMessage"></div><div class="alert-footer"><button class="alert-btn" onclick="closeAlertModal()">OK</button></div></div></div>

    <script>
        const SPREADSHEET_ID = '1ACLheHmzkn1Ut92oSeSTn5GekSm20luwSrxmcLoijQ4';
        const SPREADSHEET_NAME = 'CamTaloja_3107';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5NBh26tyNs3Ae7UiyBThu8tTV3xFV21pJR16WnPBXnNvzKRyyLYKsmShdln9yRRexUA/exec';
        const DRIVE_FOLDER_ID = '1KCS4l-0n8D-kjaZYmAHJsPKGT_7aj4b4';

        let tripsData = [];
        let currentTrip = null;
        let currentRowIndex = null;
        let currentSearchTerm = '';

        function safeString(val) { return val === null || val === undefined ? '' : String(val); }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function formatDateDMY(dateStr) {
            if (!dateStr) return '-';
            try {
                if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
                    const parts = dateStr.split('T')[0].split('-');
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}/)) return dateStr;
                const d = new Date(dateStr);
                if (!isNaN(d)) return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
                return dateStr;
            } catch(e) { return dateStr; }
        }

        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            try {
                if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}/)) {
                    const parts = dateStr.split('/');
                    return `${parts[2]}-${parts[1]}-${parts[0]}`;
                }
                if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) return dateStr.split('T')[0];
                const d = new Date(dateStr);
                if (!isNaN(d)) return d.toISOString().split('T')[0];
                return '';
            } catch(e) { return ''; }
        }

        async function loadTrips() {
            showLoading();
            try {
                const res = await fetch(`${SCRIPT_URL}?spreadsheetId=${SPREADSHEET_ID}&sheetName=${SPREADSHEET_NAME}`);
                const result = await res.json();
                if (result.status === 'success' && result.data) {
                    tripsData = result.data;
                    if (currentSearchTerm) performSearch(currentSearchTerm);
                    else displayTrips(tripsData);
                } else throw new Error(result.message || 'Failed to load');
            } catch(err) {
                document.getElementById('tripsTableBody').innerHTML = '<tr><td colspan="6" class="no-data">Error loading data. Please refresh.</td></tr>';
                showAlert(err.message, 'error');
            } finally { hideLoading(); }
        }

        function displayTrips(data) {
            const tbody = document.getElementById('tripsTableBody');
            if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="no-data">No trip records found.</td></tr>'; return; }
            let html = '';
            data.forEach((trip, idx) => {
                const srNo = idx+1;
                const date = formatDateDMY(safeString(trip['Date']));
                const lrNo = safeString(trip['LR No']) || '-';
                const distributor = safeString(trip['Distributor']) || '-';
                const totalAmount = (parseFloat(safeString(trip['Food Amt'])) || 0) + (parseFloat(safeString(trip['Advance'])) || 0) + (parseFloat(safeString(trip['Diesel Cost'])) || 0) + (parseFloat(safeString(trip['Unloading Charge'])) || 0);
                html += `<tr><td>${srNo}</td><td>${escapeHtml(date)}</td><td><strong>${escapeHtml(lrNo)}</strong></td><td>${escapeHtml(distributor)}</td><td>₹ ${totalAmount.toFixed(2)}</td><td><div class="action-buttons"><button class="btn-view" onclick="viewTrip(${idx})">👁️ View</button><button class="btn-update" onclick="updateTrip(${idx})">✏️ Update</button></div></td></tr>`;
            });
            tbody.innerHTML = html;
        }

        function performSearch(term) {
            currentSearchTerm = term;
            const clearBtn = document.getElementById('searchClear');
            const resultDiv = document.getElementById('searchResultCount');
            if (term && term.trim()) {
                clearBtn.style.display = 'block';
                const lowerTerm = term.toLowerCase().trim();
                const filtered = tripsData.filter(trip => safeString(trip['LR No']).toLowerCase().includes(lowerTerm) || safeString(trip['Destination']).toLowerCase().includes(lowerTerm) || safeString(trip['Distributor']).toLowerCase().includes(lowerTerm));
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `Found ${filtered.length} result(s) for "${escapeHtml(term)}"`;
                displayTrips(filtered);
            } else {
                clearBtn.style.display = 'none';
                resultDiv.style.display = 'none';
                displayTrips(tripsData);
            }
        }

        function clearSearch() { document.getElementById('searchInput').value = ''; performSearch(''); }

        function viewTrip(index) {
            if (!tripsData[index]) { showAlert('Trip record not found!', 'error'); return; }
            currentTrip = tripsData[index];
            currentRowIndex = index + 2;
            const modalBody = document.getElementById('modalBody');
            const fields = ['Sr. No','Date','LR No','Start KM','End KM','Distance','Food Amt','Advance','Diesel liter','Diesel Rate','Diesel Cost','Destination','Distributor','Unloading Charge','Note'];
            let html = '<table class="details-table">';
            fields.forEach(f => {
                let val = safeString(currentTrip[f]);
                if (f === 'Date') val = formatDateDMY(val);
                if (val === '') val = '-';
                html += `<tr><td>${f}</td><td>${escapeHtml(val)}</td></tr>`;
            });
            const fileVal = safeString(currentTrip['File']);
            if (fileVal && fileVal !== '-') {
                html += `<tr><td>File</td><td><a href="${fileVal}" target="_blank" class="file-link">📄 View File</a> <button class="btn-file-view" onclick="window.open('${fileVal}','_blank')">🔗 Open</button></td></tr>`;
            } else html += `<tr><td>File</td><td>-</td></tr>`;
            html += '</table>';
            modalBody.innerHTML = html;
            document.getElementById('viewModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function confirmDeleteTrip() {
            closeModal();
            showAlertWithCallback('Are you sure you want to delete this trip record?', 'warning', async () => {
                showLoading();
                try {
                    const fd = new FormData();
                    fd.append('spreadsheetId', SPREADSHEET_ID);
                    fd.append('sheetName', SPREADSHEET_NAME);
                    fd.append('action', 'delete');
                    fd.append('rowIndex', currentRowIndex);
                    const res = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                    const result = await res.json();
                    if (result.status === 'success') {
                        showAlert('✅ Trip record deleted successfully!', 'success');
                        loadTrips();
                    } else throw new Error(result.message);
                } catch(err) { showAlert('Error: '+err.message, 'error'); }
                finally { hideLoading(); }
            });
        }

        function calculateDistanceAndCost() {
            const startKM = parseFloat(document.getElementById('update_Start_KM')?.value) || 0;
            const endKM = parseFloat(document.getElementById('update_End_KM')?.value) || 0;
            const distance = endKM - startKM;
            if (distance >= 0) {
                document.getElementById('update_Distance').value = distance;
            }
            
            const dieselLiter = parseFloat(document.getElementById('update_Diesel_liter')?.value) || 0;
            const dieselRate = parseFloat(document.getElementById('update_Diesel_Rate')?.value) || 0;
            const dieselCost = dieselLiter * dieselRate;
            document.getElementById('update_Diesel_Cost').value = dieselCost.toFixed(2);
        }

        function updateTrip(index) {
            if (!tripsData[index]) { showAlert('Trip record not found!', 'error'); return; }
            currentTrip = tripsData[index];
            currentRowIndex = index + 2;
            const container = document.getElementById('updateFormContainer');
            let html = '<h3 style="color:#1e3c72; margin-bottom:20px;">✏️ Update Trip Details</h3><div class="update-form"><div class="form-grid-2">';
            
            const fields = [
                { label:'Date', name:'Date', type:'date' },
                { label:'LR No', name:'LR No', type:'text' },
                { label:'Start KM', name:'Start KM', type:'number', step:'1' },
                { label:'End KM', name:'End KM', type:'number', step:'1' },
                { label:'Distance (Auto)', name:'Distance', type:'number', readonly:true },
                { label:'Food Amt', name:'Food Amt', type:'number', step:'0.01' },
                { label:'Advance', name:'Advance', type:'number', step:'0.01' },
                { label:'Diesel liter', name:'Diesel liter', type:'number', step:'0.01' },
                { label:'Diesel Rate', name:'Diesel Rate', type:'number', step:'0.01' },
                { label:'Diesel Cost (Auto)', name:'Diesel Cost', type:'number', step:'0.01', readonly:true },
                { label:'Destination', name:'Destination', type:'text' },
                { label:'Distributor', name:'Distributor', type:'text' },
                { label:'Unloading Charge', name:'Unloading Charge', type:'number', step:'0.01' },
                { label:'Note', name:'Note', type:'textarea', rows:2 }
            ];
            
            fields.forEach(f => {
                let val = safeString(currentTrip[f.name]);
                if (f.name === 'Date') val = formatDateForInput(val);
                let readonlyAttr = f.readonly ? 'readonly' : '';
                html += `<div class="form-row"><label>${f.label}</label>`;
                if (f.type === 'textarea') {
                    html += `<textarea id="update_${f.name.replace(/\s/g,'_')}" rows="${f.rows}">${escapeHtml(val)}</textarea>`;
                } else {
                    html += `<input type="${f.type}" id="update_${f.name.replace(/\s/g,'_')}" value="${escapeHtml(val)}" step="${f.step || 'any'}" ${readonlyAttr}>`;
                }
                html += `</div>`;
            });
            
            const currentFile = safeString(currentTrip['File']);
            html += `<div class="form-row"><label>File</label><input type="file" id="update_file" accept=".pdf,.jpg,.jpeg,.png"><div class="current-file">${currentFile ? `<a href="${currentFile}" target="_blank" class="file-link">📄 Current File</a>` : 'No file uploaded'}</div><input type="hidden" id="existingFile" value="${escapeHtml(currentFile)}"></div>`;
            html += `</div><div style="display:flex; gap:10px; justify-content:flex-end; margin-top:30px;"><button class="btn-cancel" onclick="goToPage1()">Cancel</button><button class="btn-submit" id="updateSubmitBtn">💾 Update Trip</button></div></div>`;
            container.innerHTML = html;
            
            // Add event listeners for calculations
            const startKM = document.getElementById('update_Start_KM');
            const endKM = document.getElementById('update_End_KM');
            const dieselLiter = document.getElementById('update_Diesel_liter');
            const dieselRate = document.getElementById('update_Diesel_Rate');
            if(startKM) { startKM.addEventListener('input', calculateDistanceAndCost); startKM.addEventListener('change', calculateDistanceAndCost); }
            if(endKM) { endKM.addEventListener('input', calculateDistanceAndCost); endKM.addEventListener('change', calculateDistanceAndCost); }
            if(dieselLiter) { dieselLiter.addEventListener('input', calculateDistanceAndCost); dieselLiter.addEventListener('change', calculateDistanceAndCost); }
            if(dieselRate) { dieselRate.addEventListener('input', calculateDistanceAndCost); dieselRate.addEventListener('change', calculateDistanceAndCost); }
            
            document.getElementById('updateSubmitBtn').addEventListener('click', handleUpdateTrip);
            goToPage2();
        }

        async function handleUpdateTrip() {
            showLoading();
            try {
                const fd = new FormData();
                fd.append('spreadsheetId', SPREADSHEET_ID);
                fd.append('sheetName', SPREADSHEET_NAME);
                fd.append('action', 'update');
                fd.append('rowIndex', currentRowIndex);
                fd.append('driveFolderId', DRIVE_FOLDER_ID);
                
                const fieldNames = ['Date','LR No','Start KM','End KM','Distance','Food Amt','Advance','Diesel liter','Diesel Rate','Diesel Cost','Destination','Distributor','Unloading Charge','Note'];
                for(let f of fieldNames) {
                    const el = document.getElementById(`update_${f.replace(/\s/g,'_')}`);
                    if(el) fd.append(f, el.value);
                }
                
                const fileInput = document.getElementById('update_file');
                if(fileInput && fileInput.files && fileInput.files[0]) {
                    const file = fileInput.files[0];
                    const reader = new FileReader();
                    const base64 = await new Promise(resolve => { reader.onload = e => resolve(e.target.result.split(',')[1]); reader.readAsDataURL(file); });
                    fd.append('fileData1', base64);
                    fd.append('fileName1', file.name);
                    fd.append('fileType1', file.type);
                    fd.append('fileColumn1', 'File');
                    fd.append('fileCount', '1');
                } else {
                    const existing = document.getElementById('existingFile')?.value;
                    if(existing) fd.append('File', existing);
                    fd.append('fileCount', '0');
                }
                
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                const result = await res.json();
                if(result.status === 'success') {
                    showAlert('✅ Trip updated successfully!', 'success');
                    setTimeout(() => { goToPage1(); loadTrips(); }, 1500);
                } else throw new Error(result.message);
            } catch(err) { showAlert('Error: '+err.message, 'error'); }
            finally { hideLoading(); }
        }

        function openAddTripModal() {
            const modal = document.getElementById('addTripModal');
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            const iframe = document.getElementById('tripFormIframe');
            if(iframe) iframe.src = iframe.src;
        }
        
        function closeAddTripModal() { 
            document.getElementById('addTripModal').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
        }

        function goToPage1() { document.getElementById('page1').classList.add('active'); document.getElementById('page2').classList.remove('active'); loadTrips(); }
        function goToPage2() { document.getElementById('page1').classList.remove('active'); document.getElementById('page2').classList.add('active'); window.scrollTo(0,0); }
        function closeModal() { document.getElementById('viewModal').style.display = 'none'; document.body.style.overflow = 'auto'; currentTrip = null; }
        function showLoading() { document.getElementById('loading').classList.add('active'); }
        function hideLoading() { document.getElementById('loading').classList.remove('active'); }
        
        function showAlert(msg, type) {
            const alertModal = document.getElementById('alertModal');
            const header = document.getElementById('alertHeader');
            const msgDiv = document.getElementById('alertMessage');
            header.className = 'alert-header ' + type;
            header.innerHTML = type==='success'?'✅ Success!':(type==='error'?'❌ Error!':'⚠️ Warning!');
            msgDiv.innerHTML = msg;
            alertModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            if(type === 'success') setTimeout(() => closeAlertModal(), 2000);
        }
        
        function showAlertWithCallback(msg, type, callback) {
            const alertModal = document.getElementById('alertModal');
            const header = document.getElementById('alertHeader');
            const msgDiv = document.getElementById('alertMessage');
            const footer = document.querySelector('#alertModal .alert-footer');
            header.className = 'alert-header ' + type;
            header.innerHTML = type==='success'?'✅ Success!':(type==='error'?'❌ Error!':'⚠️ Warning!');
            msgDiv.innerHTML = msg;
            footer.innerHTML = `<button class="alert-btn" style="background:#e74c3c;" onclick="executeCallbackAndClose()">Delete</button><button class="alert-btn" onclick="closeAlertModal()">Cancel</button>`;
            window.pendingCallback = callback;
            alertModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        
        window.executeCallbackAndClose = function() {
            closeAlertModal();
            if(window.pendingCallback) window.pendingCallback();
            delete window.pendingCallback;
        };
        
        function closeAlertModal() {
            document.getElementById('alertModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            const footer = document.querySelector('#alertModal .alert-footer');
            footer.innerHTML = `<button class="alert-btn" onclick="closeAlertModal()">OK</button>`;
        }
        
        window.onclick = function(e) {
            if(e.target === document.getElementById('viewModal')) closeModal();
            if(e.target === document.getElementById('addTripModal')) closeAddTripModal();
            if(e.target === document.getElementById('alertModal')) closeAlertModal();
        };
        
        document.getElementById('searchInput').addEventListener('input', function(e) { performSearch(e.target.value); });
        window.onload = () => loadTrips();
    </script>
</body>
</html>
