<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Driver Details Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: auto;
            padding: 5px;
        }

        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }
        
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
            padding-bottom: 60px;
        }

        .action-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            justify-content: space-between;
        }

        .search-container {
            flex: 2;
            position: relative;
            min-width: 250px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #7f8c8d;
        }

        .search-clear {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #95a5a6;
            display: none;
            font-size: 18px;
            background: none;
            border: none;
        }

        .search-clear:hover {
            color: #e74c3c;
        }

        .search-result-count {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 8px;
            display: none;
        }

        .btn-refresh {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh:hover {
            background: #1e3c72;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 82, 152, 0.3);
        }

        .btn-add {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        @media (max-width: 768px) {
            .action-bar {
                flex-direction: column;
                gap: 12px;
            }
            
            .button-group {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                width: 100%;
            }
            
            .btn-refresh, .btn-add {
                width: 100%;
                justify-content: center;
                padding: 14px;
                font-size: 16px;
            }
            
            .search-container {
                width: 100%;
                order: 3;
            }
            
            .search-box input {
                padding: 14px 40px 14px 45px;
                font-size: 16px;
            }
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e1e8ed;
            background: white;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .table-container::-webkit-scrollbar {
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #1e3c72;
            border-bottom: 2px solid #e1e8ed;
            font-size: 14px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e1e8ed;
            color: #34495e;
            font-size: 14px;
        }

        tr:hover {
            background: #f8fafc;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-view {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-view:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(52, 152, 219, 0.3);
        }

        .btn-update {
            background: #f39c12;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-update:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(243, 156, 18, 0.3);
        }

        @media (max-width: 768px) {
            .btn-view, .btn-update {
                padding: 10px 14px;
                font-size: 13px;
                flex: 1;
                justify-content: center;
            }
            
            td {
                padding: 12px 10px;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 6px;
            }
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-delete:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .btn-submit {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .btn-file-view {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            margin: 2px;
            transition: all 0.3s ease;
        }

        .btn-file-view:hover {
            background: #2980b9;
        }

        .btn-copy {
            background: #1abc9c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            margin: 2px;
            transition: all 0.3s ease;
        }

        .btn-copy:hover {
            background: #16a085;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .modal::-webkit-scrollbar {
            display: none;
        }

        .modal-content {
            background-color: white;
            margin: 0;
            padding: 0;
            border-radius: 0;
            width: 100%;
            min-height: 100vh;
            box-shadow: none;
            animation: slideUp 0.3s ease;
        }

        .alert-modal-content {
            background-color: white;
            margin: 20% auto;
            padding: 0;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: scaleIn 0.3s ease;
            min-height: auto;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            transform: scale(1.1);
        }

        .modal-body {
            padding: 25px;
            max-height: calc(100vh - 70px);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .modal-body::-webkit-scrollbar {
            display: none;
        }

        .modal-footer {
            padding: 15px 25px;
            border-top: 1px solid #e1e8ed;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: sticky;
            bottom: 0;
            background: white;
        }

        .alert-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .alert-content {
            background: white;
            border-radius: 20px;
            padding: 0;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: scaleIn 0.3s ease;
        }

        .alert-header {
            padding: 20px;
            border-radius: 20px 20px 0 0;
            font-size: 24px;
        }

        .alert-header.success {
            background: #27ae60;
            color: white;
        }

        .alert-header.error {
            background: #e74c3c;
            color: white;
        }

        .alert-header.warning {
            background: #f39c12;
            color: white;
        }

        .alert-body {
            padding: 30px 20px;
            font-size: 16px;
            color: #333;
        }

        .alert-footer {
            padding: 15px 20px;
            border-top: 1px solid #e1e8ed;
        }

        .alert-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .alert-btn:hover {
            background: #1e3c72;
            transform: translateY(-2px);
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
        }

        .details-table tr {
            border-bottom: 1px solid #e1e8ed;
        }

        .details-table td {
            padding: 12px;
        }

        .details-table td:first-child {
            font-weight: 600;
            width: 35%;
            background: #f8fafc;
            color: #1e3c72;
        }

        .details-table td:last-child {
            width: 65%;
            color: #34495e;
            word-break: break-word;
        }

        .update-form {
            display: grid;
            gap: 20px;
        }

        .form-row {
            display: grid;
            gap: 10px;
        }

        .form-row label {
            font-weight: 600;
            color: #1e3c72;
            font-size: 14px;
        }

        .form-row label .required {
            color: #e74c3c;
        }

        .form-row input, .form-row textarea, .form-row select {
            padding: 10px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-row input:focus, .form-row textarea:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .form-row input.error {
            border-color: #e74c3c;
        }

        .error-message {
            color: #e74c3c;
            font-size: 11px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .file-link {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }

        .file-link:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2a5298;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .content {
                padding: 15px;
                padding-bottom: 40px;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
            
            .modal-body {
                padding: 15px;
            }
            
            .details-table td {
                padding: 10px;
                font-size: 13px;
            }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .back-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #7f8c8d;
            transform: translateX(-5px);
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .file-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e1e8ed;
        }

        .file-section h4 {
            color: #1e3c72;
            margin-bottom: 15px;
        }

        .file-upload-group {
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            border: 2px dashed #e1e8ed;
        }

        .file-upload-group label {
            color: #2a5298;
            font-weight: 600;
        }

        .file-info {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .current-file {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .vehicle-format-hint {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .search-highlight {
            background-color: #fff3cd;
            color: #856404;
            font-weight: bold;
            padding: 0 2px;
            border-radius: 3px;
        }

        .update-page-bottom {
            margin-bottom: 60px;
        }
        
        @media (max-width: 768px) {
            .update-page-bottom {
                margin-bottom: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <h2>🚛 Driver Details Management System</h2>
            <p>View, Update and Manage Driver Information</p>
        </div>

        <div class="content">
            <!-- Page 1: View All Drivers -->
            <div id="page1" class="page active">
                <div class="action-bar">
                    <div class="button-group">
                        <button class="btn-refresh" onclick="loadDrivers()">🔄 Refresh</button>
                        <button class="btn-add" onclick="openAddDriverModal()">➕ Add New Driver</button>
                    </div>
                    <div class="search-container">
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="searchInput" placeholder="Search by Driver Name, Mobile Number or Vehicle No...">
                            <button class="search-clear" id="searchClear" onclick="clearSearch()">✖</button>
                        </div>
                        <div class="search-result-count" id="searchResultCount"></div>
                    </div>
                </div>
                <div class="table-container">
                    <table id="driversTable">
                        <thead>
                            <tr>
                                <th>Sr. No</th>
                                <th>Date of Join</th>
                                <th>Driver Name</th>
                                <th>Mobile Number</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="driversTableBody">
                            <tr>
                                <td colspan="5" class="no-data">Loading data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Page 2: Update Driver -->
            <div id="page2" class="page">
                <button class="back-btn" onclick="goToPage1()">← Back to Driver List</button>
                <div class="table-container update-page-bottom">
                    <div id="updateFormContainer" style="padding: 20px;">
                        <!-- Dynamic form fields will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- View Details Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📄 Driver Details</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content -->
            </div>
            <div class="modal-footer">
                <button class="btn-delete" onclick="deleteDriver()">🗑 Delete Driver</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Add New Driver Modal -->
    <div id="addDriverModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ Add New Driver</h2>
                <button class="close-modal" onclick="closeAddDriverModal()">&times;</button>
            </div>
            <div class="modal-body" id="addDriverModalBody">
                <iframe id="driverFormIframe" src="DriverDetails.html" style="width: 100%; height: calc(100vh - 80px); border: none; border-radius: 10px;"></iframe>
            </div>
        </div>
    </div>

    <!-- Alert Popup Modal -->
    <div id="alertModal" class="alert-modal">
        <div class="alert-content">
            <div class="alert-header" id="alertHeader">
                <span id="alertIcon"></span>
            </div>
            <div class="alert-body" id="alertMessage">
                Message here
            </div>
            <div class="alert-footer">
                <button class="alert-btn" onclick="closeAlertModal()">OK</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const SPREADSHEET_ID = '1bopVE4D9z0fMwBWq0NGSIGuGYjqG0iIWQNxeFtguUvc';
        const SHEET_NAME = 'Driver Details';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5NBh26tyNs3Ae7UiyBThu8tTV3xFV21pJR16WnPBXnNvzKRyyLYKsmShdln9yRRexUA/exec';
        const DRIVE_FOLDER_ID = '1I-FRUe_xUhx7CD1h6--vZmBGtCm13bah';
        
        // Global variables
        let driversData = [];
        let currentDriver = null;
        let currentRowIndex = null;
        let currentSearchTerm = '';
        
        // Helper function to safely get string value
        function safeString(value) {
            if (value === null || value === undefined) return '';
            return String(value);
        }
        
        // Load drivers on page load
        window.onload = function() {
            loadDrivers();
            
            // Add search input event listener
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    performSearch(this.value);
                });
            }
        };
        
        // Search Functions
        function clearSearch() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.value = '';
                performSearch('');
            }
        }

        function performSearch(searchTerm) {
            currentSearchTerm = searchTerm;
            const searchClear = document.getElementById('searchClear');
            const resultCountDiv = document.getElementById('searchResultCount');
            
            if (searchTerm && searchTerm.trim() !== '') {
                searchClear.style.display = 'block';
                const term = searchTerm.toLowerCase().trim();
                
                // Filter drivers based on search term with safe string conversion
                const filtered = driversData.filter(driver => {
                    const srNo = safeString(driver['Sr. No']).toLowerCase();
                    const driverName = safeString(driver['Driver Name']).toLowerCase();
                    const mobileNumber = safeString(driver['Mobile Number']).toLowerCase();
                    const vehicleNo = safeString(driver['Vehicle No']).toLowerCase();
                    
                    return srNo.includes(term) || 
                           driverName.includes(term) || 
                           mobileNumber.includes(term) || 
                           vehicleNo.includes(term);

        function displayDriversWithHighlight(data, searchTerm) {
    const tbody = document.getElementById('driversTableBody');
    if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="no-data">No drivers found matching your search.</td></tr>';
        return;
    }
    
    let html = '';
    data.forEach((driver, idx) => {
        // Find original index for actions
        const originalIndex = driversData.findIndex(d => safeString(d['Sr. No']) === safeString(driver['Sr. No']));
        const displayIndex = idx + 1;
        
        // Format date
        let dateValue = safeString(driver['Date of Join']);
        if (dateValue && dateValue !== '-' && dateValue !== '') {
            if (dateValue.match(/^\d{4}-\d{2}-\d{2}/)) {
                const parts = dateValue.split('T')[0].split('-');
                dateValue = `${parts[2]}/${parts[1]}/${parts[0]}`;
            }
        } else {
            dateValue = '-';
        }
        
        let driverName = safeString(driver['Driver Name']);
        let mobileNumber = safeString(driver['Mobile Number']);
        let vehicleNo = safeString(driver['Vehicle No']);
        
        if (driverName === '') driverName = '-';
        if (mobileNumber === '') mobileNumber = '-';
        if (vehicleNo === '') vehicleNo = '-';
        
        // Highlight search term if present - FIXED to handle partial matches properly
        if (searchTerm && searchTerm.trim() !== '') {
            const term = searchTerm.trim();
            // Escape special regex characters
            const escapedTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            // Create regex that matches whole words or numbers properly
            const regex = new RegExp(`(${escapedTerm})`, 'gi');
            
            // For Driver Name (text) - highlight normally
            if (driverName !== '-') {
                driverName = driverName.replace(regex, '<span class="search-highlight">$1</span>');
            }
            
            // For Mobile Number - create a temporary copy for highlighting without breaking the number
            if (mobileNumber !== '-') {
                // Split the number into parts and highlight only exact matches
                let tempNumber = mobileNumber;
                let highlightedNumber = '';
                let lastIndex = 0;
                let match;
                
                // Reset regex lastIndex
                regex.lastIndex = 0;
                
                // Find all matches and build the highlighted string
                while ((match = regex.exec(tempNumber)) !== null) {
                    // Add the text before the match
                    highlightedNumber += escapeHtml(tempNumber.substring(lastIndex, match.index));
                    // Add the highlighted match
                    highlightedNumber += `<span class="search-highlight">${escapeHtml(match[0])}</span>`;
                    lastIndex = match.index + match[0].length;
                }
                // Add the remaining text
                highlightedNumber += escapeHtml(tempNumber.substring(lastIndex));
                mobileNumber = highlightedNumber;
            }
            
            // For Vehicle No - highlight similarly
            if (vehicleNo !== '-') {
                let tempVehicle = vehicleNo;
                let highlightedVehicle = '';
                let lastIndex = 0;
                let match;
                
                regex.lastIndex = 0;
                
                while ((match = regex.exec(tempVehicle)) !== null) {
                    highlightedVehicle += escapeHtml(tempVehicle.substring(lastIndex, match.index));
                    highlightedVehicle += `<span class="search-highlight">${escapeHtml(match[0])}</span>`;
                    lastIndex = match.index + match[0].length;
                }
                highlightedVehicle += escapeHtml(tempVehicle.substring(lastIndex));
                vehicleNo = highlightedVehicle;
            }
        }
        
        html += `
            <tr>
                <td>${displayIndex}</td>
                <td>${escapeHtml(dateValue)}</td>
                <td><strong>${driverName}</strong></td>
                <td>${mobileNumber}</td>
                <td>
                    <div class="action-buttons">
                        <button class="btn-view" onclick="viewDriver(${originalIndex})">👁️ View</button>
                        <button class="btn-update" onclick="updateDriver(${originalIndex})">✏️ Update</button>
                    </div>
                </td>
            </tr>
        `;
    });
    tbody.innerHTML = html;
}

        // Format date to DD/MM/YYYY
        function formatDateToDMY(dateStr) {
            if (!dateStr || dateStr === '-') return '-';
            try {
                if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
                    const parts = dateStr.split('T')[0].split('-');
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}/)) {
                    return dateStr;
                }
                const d = new Date(dateStr);
                if (!isNaN(d.getTime())) {
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const year = d.getFullYear();
                    return `${day}/${month}/${year}`;
                }
                return dateStr;
            } catch (e) {
                return dateStr;
            }
        }
        
        // Format date for input (YYYY-MM-DD)
        function formatDateForInput(dateStr) {
            if (!dateStr || dateStr === '-') return '';
            try {
                if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}/)) {
                    const parts = dateStr.split('/');
                    return `${parts[2]}-${parts[1]}-${parts[0]}`;
                }
                if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
                    return dateStr.split('T')[0];
                }
                const d = new Date(dateStr);
                if (!isNaN(d.getTime())) {
                    const year = d.getFullYear();
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    return `${year}-${month}-${day}`;
                }
                return '';
            } catch (e) {
                return '';
            }
        }

                    } else {
                        errorDiv.classList.remove('show');
                        this.classList.remove('error');
                    }
                });
            }
        }
        
        // Validate update form
        function validateUpdateForm() {
            let isValid = true;
            
            // Clear all error messages
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
            });
            document.querySelectorAll('.form-row input').forEach(el => {
                el.classList.remove('error');
            });
            
            // Date validation
            const dateInput = document.getElementById('update_Date_of_Join');
            if (dateInput && dateInput.value && new Date(dateInput.value) > new Date()) {
                document.getElementById('error_Date_of_Join').classList.add('show');
                dateInput.classList.add('error');
                isValid = false;
            }
            
            // Mobile validation
            const mobileInput = document.getElementById('update_Mobile_Number');
            if (mobileInput && mobileInput.value && !/^[6-9][0-9]{9}$/.test(mobileInput.value)) {
                document.getElementById('error_Mobile_Number').classList.add('show');
                mobileInput.classList.add('error');
                isValid = false;
            }
            
            // Alternate Mobile validation
            const alterMobileInput = document.getElementById('update_Alter_Mob_No');
            if (alterMobileInput && alterMobileInput.value && !/^[6-9][0-9]{9}$/.test(alterMobileInput.value)) {
                document.getElementById('error_Alter_Mob_No').classList.add('show');
                alterMobileInput.classList.add('error');
                isValid = false;
            }
            
            // Email validation
            const emailInput = document.getElementById('update_Email_Id');
            if (emailInput && emailInput.value) {
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(emailInput.value)) {
                    document.getElementById('error_Email_Id').classList.add('show');
                    emailInput.classList.add('error');
                    isValid = false;
                }
            }
            
            // IFSC validation
            const ifscInput = document.getElementById('update_IFSC_Code');
            if (ifscInput && ifscInput.value && ifscInput.value.length !== 11) {
                document.getElementById('error_IFSC_Code').classList.add('show');
                ifscInput.classList.add('error');
                isValid = false;
            }
            
            return isValid;
        }
        
        // Handle update form submission
        async function handleUpdateSubmit(e) {
            e.preventDefault();
            
            if (!validateUpdateForm()) {
                showAlert('Please fix the errors in the form before submitting.', 'warning');
                return;
            }
            
            showLoading();
            try {
                const formData = new FormData();
                formData.append('spreadsheetId', SPREADSHEET_ID);
                formData.append('sheetName', SHEET_NAME);
                formData.append('action', 'update');
                formData.append('rowIndex', currentRowIndex);
                formData.append('driveFolderId', DRIVE_FOLDER_ID);
                
                const editableFields = [
                    'Date of Join', 'Driver Name', 'Vehicle No', 'Mobile Number', 
                    'Alter Mob No', 'Email Id', 'Salary Per Day', 'Total Salary', 
                    'Incentive Name 1', 'Incentive Amount 1', 'Incentive Name 2', 'Incentive Amount 2',
                    'Account No', 'Account Name', 'Bank Name', 'Branch Name', 'IFSC Code',
                    'Address', 'Note', 'Name of Other Documents'
                ];
                
                for (const field of editableFields) {
                    const input = document.getElementById(`update_${field.replace(/\s/g, '_')}`);
                    if (input) {
                        formData.append(field, input.value);
                    }
                }
                
                const fileFields = [
                    'Bank Passbook File', 'Driver Photo', 'Upload Aadhar Card', 'Upload Pan Card', 'Other Document'
                ];
                
                let fileIndex = 1;
                for (let i = 0; i < fileFields.length; i++) {
                    const fileInput = document.getElementById(`file_${i}`);
                    const hiddenInput = document.getElementById(`hidden_${i}`);
                    
                    if (fileInput && fileInput.files && fileInput.files[0]) {
                        const file = fileInput.files[0];
                        const fileData = await fileToBase64(file);
                        formData.append(`fileData${fileIndex}`, fileData);
                        formData.append(`fileName${fileIndex}`, file.name);
                        formData.append(`fileType${fileIndex}`, file.type);
                        formData.append(`fileColumn${fileIndex}`, fileFields[i]);
                        fileIndex++;
                    } else if (hiddenInput && hiddenInput.value) {
                        formData.append(fileFields[i], hiddenInput.value);
                    }
                }
                
                formData.append('fileCount', fileIndex - 1);
                
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    showAlert('✅ Driver details updated successfully!', 'success');
                    setTimeout(() => {
                        goToPage1();
                        loadDrivers();
                    }, 1500);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('Error updating driver:', error);
                showAlert('❌ Error updating driver: ' + error.message, 'error');
            } finally {
                hideLoading();
            }
        }
        
        // Open Add Driver Modal
        function openAddDriverModal() {
            document.getElementById('addDriverModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            const iframe = document.getElementById('driverFormIframe');
            if (iframe) iframe.src = iframe.src;
        }
        
        // Close Add Driver Modal
        function closeAddDriverModal() {
            document.getElementById('addDriverModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        // Helper functions
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showAlert('✅ Link copied to clipboard!', 'success');
            }).catch(() => {
                prompt('Copy this link:', text);
            });
        }
        
        function closeModal() {
            document.getElementById('viewModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            currentDriver = null;
            currentRowIndex = null;
        }
        
        function goToPage1() {
            document.getElementById('page1').classList.add('active');
            document.getElementById('page2').classList.remove('active');
            loadDrivers();
        }
        
        function goToPage2() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            window.scrollTo(0, 0);
        }
        
        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }
        
        // Close modals when clicking outside
        window.onclick = function(event) {
            const viewModal = document.getElementById('viewModal');
            const addModal = document.getElementById('addDriverModal');
            const alertModal = document.getElementById('alertModal');
            if (event.target === viewModal) {
                closeModal();
            }
            if (event.target === addModal) {
                closeAddDriverModal();
            }
            if (event.target === alertModal) {
                closeAlertModal();
            }
        }
    </script>
