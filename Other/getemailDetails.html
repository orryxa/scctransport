<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Contact Management System - Email Directory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        /* Hide scrollbars but keep scrolling functional */
        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }
        
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
            padding-bottom: 60px;
        }

        .action-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            justify-content: space-between;
        }

        .search-container {
            flex: 2;
            position: relative;
            min-width: 250px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #7f8c8d;
        }

        .search-clear {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #95a5a6;
            display: none;
            font-size: 18px;
            background: none;
            border: none;
        }

        .search-clear:hover {
            color: #e74c3c;
        }

        .search-result-count {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 8px;
            display: none;
        }

        .btn-refresh {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh:hover {
            background: #1e3c72;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 82, 152, 0.3);
        }

        .btn-add {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        @media (max-width: 768px) {
            .action-bar {
                flex-direction: column;
                gap: 12px;
            }
            
            .button-group {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                width: 100%;
            }
            
            .btn-refresh, .btn-add {
                width: 100%;
                justify-content: center;
                padding: 14px;
                font-size: 16px;
            }
            
            .search-container {
                width: 100%;
                order: 3;
            }
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e1e8ed;
            background: white;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #1e3c72;
            border-bottom: 2px solid #e1e8ed;
            font-size: 14px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e1e8ed;
            color: #34495e;
            font-size: 14px;
        }

        tr:hover {
            background: #f8fafc;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-view {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-view:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-update {
            background: #f39c12;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-update:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .btn-view, .btn-update {
                padding: 10px 14px;
                font-size: 13px;
                flex: 1;
                justify-content: center;
            }
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-delete:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .btn-submit {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        /* Modal Styles - Enhanced for mobile with padding and scroll */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-content {
            background-color: white;
            margin: 0;
            padding: 0;
            border-radius: 0;
            width: 100%;
            min-height: 100vh;
            animation: slideUp 0.3s ease;
        }

        /* Enhanced mobile view for Add Email Modal */
        #addEmailModal .modal-content {
            padding: 5px;
        }

        #addEmailModal .modal-body {
            padding: 5px;
            max-height: calc(100vh - 60px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #addEmailModal iframe {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
            border-radius: 12px;
            display: block;
        }

        @media (max-width: 768px) {
            #addEmailModal .modal-content {
                padding: 5px;
            }
            
            #addEmailModal .modal-body {
                padding: 5px;
            }
            
            #addEmailModal .modal-header {
                padding: 15px;
            }
            
            #addEmailModal .modal-header h2 {
                font-size: 1.2rem;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            transform: scale(1.1);
        }

        .modal-body {
            padding: 25px;
            max-height: calc(100vh - 70px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-footer {
            padding: 15px 25px;
            border-top: 1px solid #e1e8ed;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: sticky;
            bottom: 0;
            background: white;
        }

        .alert-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .alert-content {
            background: white;
            border-radius: 20px;
            padding: 0;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .alert-header {
            padding: 20px;
            border-radius: 20px 20px 0 0;
            font-size: 24px;
        }

        .alert-header.success {
            background: #27ae60;
            color: white;
        }

        .alert-header.error {
            background: #e74c3c;
            color: white;
        }

        .alert-header.warning {
            background: #f39c12;
            color: white;
        }

        .alert-body {
            padding: 30px 20px;
            font-size: 16px;
            color: #333;
        }

        .alert-footer {
            padding: 15px 20px;
            border-top: 1px solid #e1e8ed;
        }

        .alert-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
        }

        .details-table tr {
            border-bottom: 1px solid #e1e8ed;
        }

        .details-table td {
            padding: 12px;
        }

        .details-table td:first-child {
            font-weight: 600;
            width: 35%;
            background: #f8fafc;
            color: #1e3c72;
        }

        .details-table td:last-child {
            width: 65%;
            color: #34495e;
            word-break: break-word;
        }

        .update-form {
            display: grid;
            gap: 20px;
        }

        .form-row {
            display: grid;
            gap: 10px;
        }

        .form-row label {
            font-weight: 600;
            color: #1e3c72;
            font-size: 14px;
        }

        .form-row label .required {
            color: #e74c3c;
        }

        .form-row input, .form-row textarea, .form-row select {
            padding: 10px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .form-row input[readonly] {
            background: #f8fafc;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2a5298;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .back-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #7f8c8d;
            transform: translateX(-5px);
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-grid-2 {
                grid-template-columns: 1fr;
            }
        }
        
        .email-hint {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        .mobile-error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <h2>📧 Contact Management System - Email Directory</h2>
            <p>Manage Contacts, Email IDs & Mobile Numbers</p>
        </div>

        <div class="content">
            <!-- Page 1: View All Contacts -->
            <div id="page1" class="page active">
                <div class="action-bar">
                    <div class="button-group">
                        <button class="btn-refresh" onclick="loadContacts()">🔄 Refresh</button>
                        <button class="btn-add" onclick="openAddEmailModal()">📧 Add New Email</button>
                    </div>
                    <div class="search-container">
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="searchInput" placeholder="Search by Name, Email or Mobile...">
                            <button class="search-clear" id="searchClear" onclick="clearSearch()">✖</button>
                        </div>
                        <div class="search-result-count" id="searchResultCount"></div>
                    </div>
                </div>
                <div class="table-container">
                    <table id="contactsTable">
                        <thead>
                            <tr><th>Sr. No</th><th>Name</th><th>Email Id</th><th>Mobile No</th><th>Note</th><th>Action</th></tr>
                        </thead>
                        <tbody id="contactsTableBody"><tr><td colspan="6" class="no-data">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Page 2: Update Contact -->
        <div id="page2" class="page">
            <button class="back-btn" onclick="goToPage1()">← Back to Contact List</button>
            <div class="table-container">
                <div id="updateFormContainer" style="padding: 20px;"></div>
            </div>
        </div>
    </div>

    <!-- View Details Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>📄 Contact Details</h2><button class="close-modal" onclick="closeModal()">&times;</button></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer"><button class="btn-delete" onclick="confirmDeleteContact()">🗑 Delete Contact</button><button class="btn-cancel" onclick="closeModal()">Close</button></div>
        </div>
    </div>

    <!-- Add Email Modal (full width with enhanced mobile padding) -->
    <div id="addEmailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>📧 Add New Email Contact</h2><button class="close-modal" onclick="closeAddEmailModal()">&times;</button></div>
            <div class="modal-body"><iframe id="emailFormIframe" src="emailDetails.html" title="Email Entry Form"></iframe></div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alertModal" class="alert-modal"><div class="alert-content"><div class="alert-header" id="alertHeader"></div><div class="alert-body" id="alertMessage"></div><div class="alert-footer"><button class="alert-btn" onclick="closeAlertModal()">OK</button></div></div></div>

    <script>
        // Google Sheets configuration
        const SPREADSHEET_ID = '1bopVE4D9z0fMwBWq0NGSIGuGYjqG0iIWQNxeFtguUvc';
        const SPREADSHEET_NAME = 'Emails';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5NBh26tyNs3Ae7UiyBThu8tTV3xFV21pJR16WnPBXnNvzKRyyLYKsmShdln9yRRexUA/exec';
        const DRIVE_FOLDER_ID = '1I-FRUe_xUhx7CD1h6--vZmBGtCm13bah';

        let contactsData = [];
        let currentContact = null;
        let currentRowIndex = null;
        let currentSearchTerm = '';

        function safeString(val) { return val === null || val === undefined ? '' : String(val); }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        // Validate mobile number: 10 digits, starts with 6,7,8,9
        function isValidMobile(mobile) {
            const mobileStr = String(mobile).trim();
            if (mobileStr.length === 0) return true; // Optional field
            const mobileRegex = /^[6-9][0-9]{9}$/;
            return mobileRegex.test(mobileStr);
        }

        // Validate email format
        function isValidEmail(email) {
            const emailStr = String(email).trim();
            if (emailStr.length === 0) return true; // Optional field
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(emailStr);
        }

        async function loadContacts() {
            showLoading();
            try {
                const res = await fetch(`${SCRIPT_URL}?spreadsheetId=${SPREADSHEET_ID}&sheetName=${SPREADSHEET_NAME}`);
                const result = await res.json();
                if (result.status === 'success' && result.data) {
                    contactsData = result.data;
                    if (currentSearchTerm) performSearch(currentSearchTerm);
                    else displayContacts(contactsData);
                } else throw new Error(result.message || 'Failed to load');
            } catch(err) {
                document.getElementById('contactsTableBody').innerHTML = '<tr><td colspan="6" class="no-data">Error loading data. Please refresh.</td></tr>';
                showAlert(err.message, 'error');
            } finally { hideLoading(); }
        }

        function displayContacts(data) {
            const tbody = document.getElementById('contactsTableBody');
            if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="no-data">No contact records found.</td></tr>'; return; }
            let html = '';
            data.forEach((contact, idx) => {
                const srNo = idx+1;
                const name = safeString(contact['Name']) || '-';
                const email = safeString(contact['Email Id']) || '-';
                const mobile = safeString(contact['Mobile No']) || '-';
                const note = safeString(contact['Note']) || '-';
                const shortNote = note.length > 30 ? note.substring(0, 27) + '...' : note;
                html += `<tr>
                    <td>${srNo}</td>
                    <td><strong>${escapeHtml(name)}</strong></td>
                    <td>${escapeHtml(email)}</td>
                    <td>${escapeHtml(mobile)}</td>
                    <td>${escapeHtml(shortNote)}</td>
                    <td><div class="action-buttons"><button class="btn-view" onclick="viewContact(${idx})">👁️ View</button><button class="btn-update" onclick="updateContact(${idx})">✏️ Update</button></div></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function performSearch(term) {
            currentSearchTerm = term;
            const clearBtn = document.getElementById('searchClear');
            const resultDiv = document.getElementById('searchResultCount');
            if (term && term.trim()) {
                clearBtn.style.display = 'block';
                const lowerTerm = term.toLowerCase().trim();
                const filtered = contactsData.filter(contact => 
                    safeString(contact['Name']).toLowerCase().includes(lowerTerm) || 
                    safeString(contact['Email Id']).toLowerCase().includes(lowerTerm) || 
                    safeString(contact['Mobile No']).toLowerCase().includes(lowerTerm)
                );
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `Found ${filtered.length} result(s) for "${escapeHtml(term)}"`;
                displayContacts(filtered);
            } else {
                clearBtn.style.display = 'none';
                resultDiv.style.display = 'none';
                displayContacts(contactsData);
            }
        }

        function clearSearch() { document.getElementById('searchInput').value = ''; performSearch(''); }

        function viewContact(index) {
            if (!contactsData[index]) { showAlert('Contact record not found!', 'error'); return; }
            currentContact = contactsData[index];
            currentRowIndex = index + 2;
            const modalBody = document.getElementById('modalBody');
            let html = '<table class="details-table">';
            html += `<tr><td>Sr. No</td><td>${index+1}</td></tr>`;
            html += `<tr><td>Name</td><td>${escapeHtml(safeString(currentContact['Name']))}</td></tr>`;
            html += `<tr><td>Email Id</td><td>${escapeHtml(safeString(currentContact['Email Id']))}</td></tr>`;
            html += `<tr><td>Mobile No</td><td>${escapeHtml(safeString(currentContact['Mobile No']))}</td></tr>`;
            html += `<tr><td>Note</td><td>${escapeHtml(safeString(currentContact['Note']))}</td></tr>`;
            html += '</table>';
            modalBody.innerHTML = html;
            document.getElementById('viewModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function confirmDeleteContact() {
            closeModal();
            showAlertWithCallback('Are you sure you want to delete this contact record?', 'warning', async () => {
                showLoading();
                try {
                    const fd = new FormData();
                    fd.append('spreadsheetId', SPREADSHEET_ID);
                    fd.append('sheetName', SPREADSHEET_NAME);
                    fd.append('action', 'delete');
                    fd.append('rowIndex', currentRowIndex);
                    const res = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                    const result = await res.json();
                    if (result.status === 'success') {
                        showAlert('✅ Contact deleted successfully!', 'success');
                        loadContacts();
                    } else throw new Error(result.message);
                } catch(err) { showAlert('Error: '+err.message, 'error'); }
                finally { hideLoading(); }
            });
        }

        function updateContact(index) {
            if (!contactsData[index]) { showAlert('Contact record not found!', 'error'); return; }
            currentContact = contactsData[index];
            currentRowIndex = index + 2;
            const container = document.getElementById('updateFormContainer');
            let html = '<h3 style="color:#1e3c72; margin-bottom:20px;">✏️ Update Contact Details</h3><div class="update-form"><div class="form-grid-2">';
            
            // Name field
            let nameVal = safeString(currentContact['Name']);
            html += `<div class="form-row"><label>Name <span class="required">*</span></label><input type="text" id="update_Name" value="${escapeHtml(nameVal)}" placeholder="Enter full name"></div>`;
            
            // Email Id field with validation
            let emailVal = safeString(currentContact['Email Id']);
            html += `<div class="form-row"><label>Email Id</label><input type="email" id="update_Email_Id" value="${escapeHtml(emailVal)}" placeholder="example@domain.com"><div class="email-hint" id="emailHint"></div></div>`;
            
            // Mobile No field with validation (10 digits, starts with 6-9)
            let mobileVal = safeString(currentContact['Mobile No']);
            html += `<div class="form-row"><label>Mobile No</label><input type="tel" id="update_Mobile_No" value="${escapeHtml(mobileVal)}" maxlength="10" placeholder="9876543210" pattern="[6-9][0-9]{9}"><div class="mobile-error" id="mobileHint"></div></div>`;
            
            // Note field - long text box
            let noteVal = safeString(currentContact['Note']);
            html += `<div class="form-row"><label>Note</label><textarea id="update_Note" rows="4" placeholder="Additional notes...">${escapeHtml(noteVal)}</textarea></div>`;
            
            html += `</div><div style="display:flex; gap:10px; justify-content:flex-end; margin-top:30px;"><button class="btn-cancel" onclick="goToPage1()">Cancel</button><button class="btn-submit" id="updateSubmitBtn">💾 Update Contact</button></div></div>`;
            container.innerHTML = html;
            
            // Add validation listeners
            const emailInput = document.getElementById('update_Email_Id');
            const mobileInput = document.getElementById('update_Mobile_No');
            const emailHint = document.getElementById('emailHint');
            const mobileHint = document.getElementById('mobileHint');
            
            if(emailInput) {
                emailInput.addEventListener('input', function() {
                    if(this.value.trim() && !isValidEmail(this.value)) {
                        emailHint.innerHTML = '❌ Invalid email format';
                        emailHint.style.color = '#e74c3c';
                    } else {
                        emailHint.innerHTML = '✓ Valid email format';
                        emailHint.style.color = '#27ae60';
                        if(!this.value.trim()) emailHint.innerHTML = '';
                    }
                });
                emailInput.dispatchEvent(new Event('input'));
            }
            
            if(mobileInput) {
                mobileInput.addEventListener('input', function() {
                    const val = this.value.trim();
                    if(val && !isValidMobile(val)) {
                        mobileHint.innerHTML = '❌ Mobile must be 10 digits starting with 6,7,8,9';
                    } else {
                        mobileHint.innerHTML = val && isValidMobile(val) ? '✓ Valid mobile number' : '';
                        if(!val) mobileHint.innerHTML = '';
                    }
                });
                mobileInput.dispatchEvent(new Event('input'));
            }
            
            document.getElementById('updateSubmitBtn').addEventListener('click', handleUpdateContact);
            goToPage2();
        }

        async function handleUpdateContact() {
            const name = document.getElementById('update_Name')?.value.trim();
            if(!name) {
                showAlert('Please enter Name', 'warning');
                return;
            }
            
            const email = document.getElementById('update_Email_Id')?.value.trim();
            if(email && !isValidEmail(email)) {
                showAlert('Please enter a valid email address', 'warning');
                return;
            }
            
            const mobile = document.getElementById('update_Mobile_No')?.value.trim();
            if(mobile && !isValidMobile(mobile)) {
                showAlert('Mobile number must be 10 digits starting with 6,7,8,9', 'warning');
                return;
            }
            
            showLoading();
            try {
                const fd = new FormData();
                fd.append('spreadsheetId', SPREADSHEET_ID);
                fd.append('sheetName', SPREADSHEET_NAME);
                fd.append('action', 'update');
                fd.append('rowIndex', currentRowIndex);
                fd.append('Name', name);
                fd.append('Email Id', email);
                fd.append('Mobile No', mobile);
                fd.append('Note', document.getElementById('update_Note')?.value || '');
                fd.append('fileCount', '0');
                
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                const result = await res.json();
                if(result.status === 'success') {
                    showAlert('✅ Contact updated successfully!', 'success');
                    setTimeout(() => { goToPage1(); loadContacts(); }, 1500);
                } else throw new Error(result.message);
            } catch(err) { showAlert('Error: '+err.message, 'error'); }
            finally { hideLoading(); }
        }

        function openAddEmailModal() {
            const modal = document.getElementById('addEmailModal');
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            const iframe = document.getElementById('emailFormIframe');
            if(iframe) iframe.src = iframe.src;
        }
        
        function closeAddEmailModal() { 
            document.getElementById('addEmailModal').style.display = 'none'; 
            document.body.style.overflow = 'auto';
            loadContacts(); // Reload after adding
        }

        function goToPage1() { document.getElementById('page1').classList.add('active'); document.getElementById('page2').classList.remove('active'); loadContacts(); }
        function goToPage2() { document.getElementById('page1').classList.remove('active'); document.getElementById('page2').classList.add('active'); window.scrollTo(0,0); }
        function closeModal() { document.getElementById('viewModal').style.display = 'none'; document.body.style.overflow = 'auto'; currentContact = null; }
        function showLoading() { document.getElementById('loading').classList.add('active'); }
        function hideLoading() { document.getElementById('loading').classList.remove('active'); }
        
        function showAlert(msg, type) {
            const alertModal = document.getElementById('alertModal');
            const header = document.getElementById('alertHeader');
            const msgDiv = document.getElementById('alertMessage');
            header.className = 'alert-header ' + type;
            header.innerHTML = type==='success'?'✅ Success!':(type==='error'?'❌ Error!':'⚠️ Warning!');
            msgDiv.innerHTML = msg;
            alertModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            if(type === 'success') setTimeout(() => closeAlertModal(), 2000);
        }
        
        function showAlertWithCallback(msg, type, callback) {
            const alertModal = document.getElementById('alertModal');
            const header = document.getElementById('alertHeader');
            const msgDiv = document.getElementById('alertMessage');
            const footer = document.querySelector('#alertModal .alert-footer');
            header.className = 'alert-header ' + type;
            header.innerHTML = type==='success'?'✅ Success!':(type==='error'?'❌ Error!':'⚠️ Warning!');
            msgDiv.innerHTML = msg;
            footer.innerHTML = `<button class="alert-btn" style="background:#e74c3c;" onclick="executeCallbackAndClose()">Delete</button><button class="alert-btn" onclick="closeAlertModal()">Cancel</button>`;
            window.pendingCallback = callback;
            alertModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        
        window.executeCallbackAndClose = function() {
            closeAlertModal();
            if(window.pendingCallback) window.pendingCallback();
            delete window.pendingCallback;
        };
        
        function closeAlertModal() {
            document.getElementById('alertModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            const footer = document.querySelector('#alertModal .alert-footer');
            footer.innerHTML = `<button class="alert-btn" onclick="closeAlertModal()">OK</button>`;
        }
        
        window.onclick = function(e) {
            if(e.target === document.getElementById('viewModal')) closeModal();
            if(e.target === document.getElementById('addEmailModal')) closeAddEmailModal();
            if(e.target === document.getElementById('alertModal')) closeAlertModal();
        };
        
        document.getElementById('searchInput').addEventListener('input', function(e) { performSearch(e.target.value); });
        window.onload = () => loadContacts();
    </script>
</body>
</html>
