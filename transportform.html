<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Transport Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        /* Clean Card Design */
        .clean-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        
        .clean-card:hover {
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }
        
        /* Form Input Styles */
        .form-input {
            transition: all 0.2s ease;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
        }
        
        .form-input:focus {
            background: white;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        
        /* Autocomplete Dropdown Styles */
        .autocomplete-container {
            position: relative;
            width: 100%;
        }
        
        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 50;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            display: none;
        }
        
        .autocomplete-dropdown.show {
            display: block;
        }
        
        .autocomplete-item {
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .autocomplete-item:hover {
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%);
            transform: translateX(4px);
        }
        
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        
        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
        }
        
        .btn-secondary {
            background: white;
            border: 1px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: #f9fafb;
            transform: translateY(-1px);
        }
        
        /* Popup Styles */
        .vehicle-popup {
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: popupSlideIn 0.3s ease-out;
        }
        
        @keyframes popupSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        /* Vehicle Item Styles */
        .vehicle-item-active {
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }
        
        .vehicle-item-active:hover {
            background: #f9fafb;
            border-color: #8b5cf6;
            transform: translateX(4px);
        }
        
        .vehicle-item-disabled {
            background: #fef2f2;
            border: 1px solid #fecaca;
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* Search Input */
        .search-input {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }
        
        .search-input:focus {
            background: white;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        
        /* Badge Styles */
        .badge-available {
            background: #10b981;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .badge-processed {
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        /* Spinner Overlay */
        .spinner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .spinner-overlay.active {
            display: flex;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #e5e7eb;
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Toast Animation */
        .toast-notification {
            animation: toastSlideIn 0.3s ease-out;
        }
        
        @keyframes toastSlideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #8b5cf6;
        }
        
        /* Disabled date style */
        input[type="date"]:disabled {
            background-color: #f3f4f6;
            cursor: not-allowed;
        }
        
        /* Form loading overlay */
        .form-loading {
            position: relative;
        }
        
        .form-loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
    </style>
</head>

    <script>
        // Configuration
        const SPREADSHEET_ID = "1j4OfSOIIoNZIjjz1LIq5dvJAGuA7hjZZJBX5KHTN7vw";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRuPw7KI6u5qOHCwcdbmmXGH_xEB0f8EnHPDzPlboNBKh_LqJmP-KQua3XFMyGWurXpg/exec";
        
        let allSheets = [];
        let currentSheet = null;
        let currentSheetType = null;
        let vehicleDataList = [];
        let driverDataList = [];
        let allVehiclesMap = new Map();
        let availableVehiclesList = [];
        let processedVehiclesList = [];
        
        // Set max date to today (disable future dates)
        function setMaxDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            const maxDate = `${year}-${month}-${day}`;
            const dateInput = document.getElementById('date');
            if (dateInput) {
                dateInput.max = maxDate;
            }
        }
        
        // Show all vehicle suggestions on click
        function showAllVehicleSuggestions() {
            const dropdown = document.getElementById('vehicle-autocomplete');
            if (vehicleDataList.length > 0) {
                dropdown.innerHTML = vehicleDataList.map(vehicle =>

        async function getDriverNameFromVehicle(vehicleNumber) {
            try {
                if (allVehiclesMap.has(vehicleNumber)) {
                    return allVehiclesMap.get(vehicleNumber);
                }
                
                const url = `${SCRIPT_URL}?action=getSheets&spreadsheetId=${SPREADSHEET_ID}`;
                const response = await fetch(url);
                const sheetsData = await response.json();
                
                let sheetNames = [];

                } else if (sheetsData && sheetsData.data && Array.isArray(sheetsData.data)) {
                    sheetNames = sheetsData.data;

                for (const sheetName of sheetNames) {
                    if (sheetName !== "Driver_Salary" && sheetName) {

                        const res = await fetch(dataUrl);

                        let data = [];
                        if (result && result.data && Array.isArray(result.data)) {
                            data = result.data;
                        } else if (Array.isArray(result)) {
                            data = result;
                        }
                        
                        for (const row of data) {
                            const vehicle = row['VEHICLE NO'] || row['vehicleno'] || row['VehicleNo'];
                            const driver = row['DRIVER NAME'] || row['drivername'] || row['DriverName'];
                            if (vehicle && vehicle.toString() === vehicleNumber && driver) {

        async function loadDriverSalaryData() {
            showSpinner('Loading vehicle data from all sheets...');
            
            try {
                const url = `${SCRIPT_URL}?action=getSheets&spreadsheetId=${SPREADSHEET_ID}`;
                const response = await fetch(url);
                const sheetsData = await response.json();
                
                let sheetNames = [];
                if (Array.isArray(sheetsData)) {
                    sheetNames = sheetsData;
                } else if (sheetsData && sheetsData.data && Array.isArray(sheetsData.data)) {
                    sheetNames = sheetsData.data;
                }
                
                allVehiclesMap.clear();
                const uniqueVehicles = new Set();
                
                const fetchPromises = [];
                for (const sheetName of sheetNames) {
                    if (sheetName !== "Driver_Salary" && sheetName) {
                        fetchPromises.push(
                            fetch(`${SCRIPT_URL}?spreadsheetId=${SPREADSHEET_ID}&sheetName=${encodeURIComponent(sheetName)}`)
                                .then(res => res.json())
                                .then(result => ({ sheetName, result }))
                                .catch(err => ({ sheetName, error: err }))
                        );
                    }
                }
                
                const results = await Promise.all(fetchPromises);
                
                for (const { result, error } of results) {
                    if (error) continue;
                    
                    let data = [];
                    if (result && result.data && Array.isArray(result.data)) {
                        data = result.data;
                    } else if (Array.isArray(result)) {
                        data = result;
                    }
                    
                    data.forEach(row => {
                        const vehicle = row['VEHICLE NO'] || row['vehicleno'] || row['VehicleNo'];
                        const driver = row['DRIVER NAME'] || row['drivername'] || row['DriverName'];
                        if (vehicle && driver) {
                            const vehicleStr = vehicle.toString().trim();
                            if (!allVehiclesMap.has(vehicleStr)) {
                                allVehiclesMap.set(vehicleStr, driver.toString().trim());
                                uniqueVehicles.add(vehicleStr);
                            }
                        }
                    });
                }
                
                const salaryUrl = `${SCRIPT_URL}?spreadsheetId=${SPREADSHEET_ID}&sheetName=${encodeURIComponent(currentSheet)}`;
                const salaryRes = await fetch(salaryUrl);
                const salaryResult = await salaryRes.json();
                
                let salaryData = [];
                if (salaryResult && salaryResult.data && Array.isArray(salaryResult.data)) {
                    salaryData = salaryResult.data;
                } else if (Array.isArray(salaryResult)) {
                    salaryData = salaryResult;
                }
                
                const existingVehicleNumbers = new Set();
                salaryData.forEach(row => {
                    const vehicle = row['VEHICLE NUMBER'] || row['VEHICLE NO'] || row['vehiclenumber'];
                    if (vehicle) {
                        existingVehicleNumbers.add(vehicle.toString().trim());
                    }
                });
                
                availableVehiclesList = Array.from(uniqueVehicles).filter(v => !existingVehicleNumbers.has(v));
                processedVehiclesList = Array.from(uniqueVehicles).filter(v => existingVehicleNumbers.has(v));
                
                const nextSL = salaryData.length + 1;
                document.getElementById('salary-sl').value = nextSL;
                
                hideSpinner();
                showToast(`Loaded ${availableVehiclesList.length} available vehicles`, 'success');
                
            } catch (err) {
                console.error('Error:', err);
                hideSpinner();
                showToast('Error loading vehicle data', 'error');
            }
        }

        function calculateKM() {
            const opening = parseFloat(document.getElementById('openingkm').value) || 0;
            const closing = parseFloat(document.getElementById('closingkm').value) || 0;
            const km = closing - opening;
            document.getElementById('km').value = km >= 0 ? km : 0;
            calculateAmount();
        }
        
        function calculateAmount() {
            const km = parseFloat(document.getElementById('km').value) || 0;
            const mileage = document.getElementById('mileage').value;
            const cngRate = parseFloat(document.getElementById('cngrate').value) || 0;
            
            let amount = 0;
            if (mileage === 'FIX' || mileage === 'fix' || mileage === 'FIXED') {
                document.getElementById('amount').readOnly = false;
                document.getElementById('amount').classList.remove('bg-gray-50');
                amount = parseFloat(document.getElementById('amount').value) || 0;
            } else {
                const mileageNum = parseFloat(mileage) || 1;
                amount = (km / mileageNum) * cngRate;
                document.getElementById('amount').value = amount.toFixed(2);
                document.getElementById('amount').readOnly = true;
                document.getElementById('amount').classList.add('bg-gray-50');
            }
            calculateTotalAmount();
        }
        
        function calculateTotalAmount() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const lul = parseFloat(document.getElementById('lul').value) || 0;
            const driverBata = parseFloat(document.getElementById('driverbata').value) || 0;
            const otherExp = parseFloat(document.getElementById('otherexp').value) || 0;
            
            const total = amount + lul + driverBata + otherExp;
            document.getElementById('totalamount').value = total.toFixed(2);
            calculateDriverDifference();
        }
        
        function calculateDriverDifference() {
            const actualIndent = parseFloat(document.getElementById('actualindent').value) || 0;
            const totalAmount = parseFloat(document.getElementById('totalamount').value) || 0;
            const difference = actualIndent - totalAmount;
            document.getElementById('driverdifference').value = difference.toFixed(2);
        }
        
        function calculateWorkDays() {
            const noOfDays = parseFloat(document.getElementById('no-of-days').value) || 0;
            const absent = parseFloat(document.getElementById('absent').value) || 0;
            const workDays = noOfDays - absent;
            document.getElementById('no-of-days-work').value = workDays >= 0 ? workDays : 0;
            calculateBalanceAmount();
        }
        
        function calculateBalanceAmount() {
            const salary = parseFloat(document.getElementById('salary').value) || 0;
            const tripAdvance = parseFloat(document.getElementById('trip-advance').value) || 0;
            const advSalary = parseFloat(document.getElementById('adv-salary').value) || 0;
            const balance = salary - (tripAdvance + advSalary);
            document.getElementById('balance-amount').value = balance.toFixed(2);
        }

            const vehicleNumber = document.getElementById('vehicle-number-input').value;
            
            if (!vehicleNumber) {
                showToast('Please select a vehicle number', 'error');
                return;
            }
            
            showSpinner('Saving driver salary data...');
            
            const postData = {
                action: 'insert',
                spreadsheetId: SPREADSHEET_ID,
                sheetName: currentSheet,
                'S.L': document.getElementById('salary-sl').value,
                'VEHICLE NUMBER': vehicleNumber,
                'DRIVERS NAME': document.getElementById('drivers-name').value,
                'NO OF DAY\'S': document.getElementById('no-of-days').value || '0',
                'ABSENT': document.getElementById('absent').value || '0',
                'NO OF DAY\'S WORK': document.getElementById('no-of-days-work').value || '0',

                'TRIP ADVANCE': document.getElementById('trip-advance').value || '0',
                'ADV SALARY': document.getElementById('adv-salary').value || '0',
                'BALANCE AMOUNT': document.getElementById('balance-amount').value || '0'
            };
            
            try {
                const formBody = new URLSearchParams();
                for (let key in postData) {
                    formBody.append(key, postData[key]);
                }
                
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formBody,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    hideSpinner();
                    showToast('Driver salary data saved successfully!', 'success');
                    resetDriverSalaryForm();
                    await loadDriverSalaryData();
                } else {
                    hideSpinner();
                    showToast('Error: ' + (result.message || 'Unknown error'), 'error');

            } catch (error) {
                console.error('Error:', error);
                hideSpinner();
                showToast('Network error. Please try again.', 'error');
            }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

            const drivername = document.getElementById('drivername').value;
            
            if (!date) {
                showToast('Please select a date', 'error');
                return;
            }
            if (!vehicleno) {
                showToast('Please enter vehicle number', 'error');
                return;
            }
            if (!drivername) {
                showToast('Please enter driver name', 'error');
                return;
            }
            
            showSpinner('Saving data...');
            
            const postData = {
                action: 'insert',
                spreadsheetId: SPREADSHEET_ID,
                sheetName: currentSheet,
                'SL': document.getElementById('sl').value,
                'DATE': formatDate(date),
                'LR NO': document.getElementById('lrno').value || '',
                'VEHICLE NO': vehicleno,
                'DRIVER NAME': drivername,
                'MILEAGE': document.getElementById('mileage').value,
                'DESTINATION': document.getElementById('destination').value || '',
                'OPENING KM': document.getElementById('openingkm').value || '0',
                'CLOSING KM': document.getElementById('closingkm').value || '0',
                'KM': document.getElementById('km').value || '0',
                'CNG OR DIESEL RATE': document.getElementById('cngrate').value,
                'AMOUNT': document.getElementById('amount').value || '0',
                'L & UL': document.getElementById('lul').value || '0',
                'DRIVER BATA': document.getElementById('driverbata').value || '0',
                'OTHER EXP': document.getElementById('otherexp').value || '0',
                'TOTAL AMOUNT': document.getElementById('totalamount').value || '0',
                'ACTUAL INDENT': document.getElementById('actualindent').value || '0',
                'DRIVER DIFFERENCE AMOUNT': document.getElementById('driverdifference').value || '0',
                'OTHER EXP REMARKS': document.getElementById('otherexpremarks').value || '',
                'POD STATUS': document.getElementById('podstatus').value || '',
                'NOTE': document.getElementById('note').value || ''
            };
            
            try {
                const formBody = new URLSearchParams();
                for (let key in postData) {
                    formBody.append(key, postData[key]);
                }
                
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formBody,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    hideSpinner();
                    showToast('Data saved successfully!', 'success');
                    resetForm();
                    await getNextSLNumber();
                    setMaxDate();
                } else {
                    hideSpinner();
                    showToast('Error: ' + (result.message || 'Unknown error'), 'error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                hideSpinner();
                showToast('Network error. Please try again.', 'error');
            }
        }
        
        function resetForm() {
            document.getElementById('date').value = '';
            document.getElementById('lrno').value = '';
            document.getElementById('vehicleno').value = '';
            document.getElementById('drivername').value = '';
            document.getElementById('mileage').value = 'FIX';
            document.getElementById('destination').value = '';
            document.getElementById('openingkm').value = '';
            document.getElementById('closingkm').value = '';
            document.getElementById('km').value = '';
            document.getElementById('cngrate').value = '90.26';
            document.getElementById('amount').value = '';
            document.getElementById('lul').value = '0';
            document.getElementById('driverbata').value = '0';
            document.getElementById('otherexp').value = '0';
            document.getElementById('totalamount').value = '';
            document.getElementById('actualindent').value = '0';
            document.getElementById('otherexpremarks').value = '';
            document.getElementById('podstatus').value = '';
            document.getElementById('note').value = '';
            setMaxDate();
        }
        
        // Event Listeners
        document.getElementById('openingkm')?.addEventListener('input', calculateKM);
        document.getElementById('closingkm')?.addEventListener('input', calculateKM);
        document.getElementById('mileage')?.addEventListener('input', calculateAmount);
        document.getElementById('cngrate')?.addEventListener('input', calculateAmount);
        document.getElementById('amount')?.addEventListener('input', calculateTotalAmount);
        document.getElementById('lul')?.addEventListener('input', calculateTotalAmount);
        document.getElementById('driverbata')?.addEventListener('input', calculateTotalAmount);
        document.getElementById('otherexp')?.addEventListener('input', calculateTotalAmount);
        document.getElementById('actualindent')?.addEventListener('input', calculateDriverDifference);
        
        document.getElementById('no-of-days')?.addEventListener('input', calculateWorkDays);
        document.getElementById('absent')?.addEventListener('input', calculateWorkDays);
        document.getElementById('salary')?.addEventListener('input', calculateBalanceAmount);
        document.getElementById('trip-advance')?.addEventListener('input', calculateBalanceAmount);
        document.getElementById('adv-salary')?.addEventListener('input', calculateBalanceAmount);
        
        document.getElementById('sheet-search').addEventListener('input', () => displaySheets(allSheets));
        
        // Initialize
        showSheetModal();
    </script>
</body>
</html>
