<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Income Tracker - Income Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: auto;
            padding: 5px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .form-container {
            padding: 30px;
        }

        /* Grid Layout */
        .form-grid {
            display: grid;
            gap: 25px;
        }

        @media (min-width: 1024px) {
            .form-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .full-width {
                grid-column: span 3;
            }
            .double-width {
                grid-column: span 2;
            }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .full-width {
                grid-column: span 2;
            }
            .double-width {
                grid-column: span 2;
            }
        }

        @media (max-width: 767px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width, .double-width {
                grid-column: span 1;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .form-group label .required {
            color: #f44336;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }

        .form-group input.error,
        .form-group select.error,
        .form-group textarea.error {
            border-color: #f44336;
        }

        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .dynamic-field {
            display: none;
            margin-top: 10px;
        }

        .dynamic-field.show {
            display: block;
        }

        .file-group {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 2px dashed #ddd;
        }

        .file-group label {
            color: #2196F3;
        }

        .file-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .file-status {
            font-size: 12px;
            margin-top: 5px;
            color: #4caf50;
            display: none;
        }

        .file-status.show {
            display: block;
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2196F3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.5s ease;
        }

        .error-message-box {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 20px;
            }
            .btn {
                width: 100%;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>💰 Income Tracker</h1>
            <p>Record all income sources with supporting documents</p>
        </div>

        <div class="form-container">
            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message-box"></div>

            <form id="incomeForm" enctype="multipart/form-data">
                <div class="form-grid">
                    <!-- Sr. No (Auto-generated) -->
                    <div class="form-group">
                        <label>Sr. No</label>
                        <input type="text" id="srNo" readonly style="background: #f5f5f5;">
                    </div>

                    <!-- Date (Today date selected automatic and future date disabled) -->
                    <div class="form-group">
                        <label>Date <span class="required">*</span></label>
                        <input type="date" id="incomeDate" required>
                        <div class="error-message" id="dateError">Future dates not allowed</div>
                    </div>

                    <!-- Income Name (Text Box) -->
                    <div class="form-group">
                        <label>Income Name <span class="required">*</span></label>
                        <input type="text" id="incomeName" placeholder="e.g., Salary, Bonus, Freelance, Rent" required>
                        <div class="error-message" id="incomeNameError">Income name is required</div>
                    </div>

                    <!-- Income From (Text Box) -->
                    <div class="form-group">
                        <label>Income From <span class="required">*</span></label>
                        <input type="text" id="incomeFrom" placeholder="e.g., Company Name, Client Name, Tenant" required>
                        <div class="error-message" id="incomeFromError">Income source is required</div>
                    </div>

                    <!-- Transaction Dropdown -->
                    <div class="form-group">
                        <label>Transaction <span class="required">*</span></label>
                        <select id="transactionType" required>
                            <option value="">Select Transaction Mode</option>
                            <option value="UPI">UPI</option>
                            <option value="Bank Transfer">Bank Transfer</option>
                            <option value="Cash">Cash</option>
                        </select>
                        <div class="error-message" id="transactionError">Please select transaction type</div>
                    </div>

                    <!-- Dynamic: UPI Transaction Id -->
                    <div class="dynamic-field" id="upiField">
                        <div class="form-group">
                            <label>UPI Transaction Id</label>
                            <input type="text" id="upiTransactionId" placeholder="e.g., 1234567890@ybl">
                        </div>
                    </div>

                    <!-- Dynamic: Bank Transaction Id -->
                    <div class="dynamic-field" id="bankField">
                        <div class="form-group">
                            <label>Bank Transaction Id</label>
                            <input type="text" id="bankTransactionId" placeholder="e.g., TXN123456789">
                        </div>
                    </div>

                    <!-- Other Transaction Id (always visible) -->
                    <div class="form-group">
                        <label>Other Transaction Id</label>
                        <input type="text" id="otherTransactionId" placeholder="Reference / Cheque No. / Receipt No.">
                    </div>

                    <!-- Amount -->
                    <div class="form-group">
                        <label>Amount (₹) <span class="required">*</span></label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                        <div class="error-message" id="amountError">Amount must be greater than 0</div>
                    </div>

                    <!-- File Upload -->
                    <div class="form-group file-group full-width">
                        <label>Upload Document / Receipt</label>
                        <input type="file" id="incomeFile" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
                        <div class="file-info">Supported: PDF, JPG, PNG, DOC (Max 5MB)</div>
                        <div class="file-status" id="fileStatus"></div>
                    </div>

                    <!-- Note -->
                    <div class="form-group full-width">
                        <label>Note</label>
                        <textarea id="note" rows="3" placeholder="Any additional remarks about this income"></textarea>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="resetIncomeForm()">Reset Form</button>
                    <button type="submit" class="btn btn-primary">Submit Income</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ======================== CONFIGURATION ========================
        const SPREADSHEET_ID = '1bopVE4D9z0fMwBWq0NGSIGuGYjqG0iIWQNxeFtguUvc';
        const INCOME_SHEET_NAME = 'Income';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5NBh26tyNs3Ae7UiyBThu8tTV3xFV21pJR16WnPBXnNvzKRyyLYKsmShdln9yRRexUA/exec';
        const DRIVE_FOLDER_ID = '1I-FRUe_xUhx7CD1h6--vZmBGtCm13bah';

        // Set today's date as default and disable future dates
        const todayDate = new Date().toISOString().split('T')[0];
        const dateInput = document.getElementById('incomeDate');
        dateInput.value = todayDate;
        dateInput.setAttribute('max', todayDate);

        // ======================== GET NEXT SR NUMBER ========================
        async function getNextIncomeSrNo() {
            try {
                const response = await fetch(`${SCRIPT_URL}?spreadsheetId=${SPREADSHEET_ID}&sheetName=${INCOME_SHEET_NAME}`);
                const data = await response.json();
                if (data.status === 'success' && data.data) {
                    return data.data.length + 1;
                }
                return 1;
            } catch (error) {
                console.error('Error fetching SR No:', error);
                return 1;
            }
        }

        async function updateSrNo() {
            const srNo = await getNextIncomeSrNo();
            document.getElementById('srNo').value = srNo;
        }
        updateSrNo();

        // ======================== TRANSACTION DYNAMIC FIELDS ========================
        const transactionSelect = document.getElementById('transactionType');
        const upiField = document.getElementById('upiField');
        const bankField = document.getElementById('bankField');

        function toggleTransactionFields() {
            upiField.classList.remove('show');
            bankField.classList.remove('show');
            
            if (transactionSelect.value === 'UPI') {
                upiField.classList.add('show');
            } else if (transactionSelect.value === 'Bank Transfer') {
                bankField.classList.add('show');
            }
            // For Cash: hide both
        }

        transactionSelect.addEventListener('change', toggleTransactionFields);

        // ======================== FILE UPLOAD HANDLING ========================
        document.getElementById('incomeFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const statusDiv = document.getElementById('fileStatus');
            if (file) {
                const fileSizeKB = (file.size / 1024).toFixed(2);
                statusDiv.textContent = `✓ ${file.name} selected (${fileSizeKB} KB)`;
                statusDiv.classList.add('show');
            } else {
                statusDiv.classList.remove('show');
            }
        });

        // ======================== FILE TO BASE64 ========================
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ======================== FORM VALIDATION ========================
        function validateIncomeForm() {
            let isValid = true;
            
            // Clear all error messages
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
            });

            // Date validation
            const incomeDate = document.getElementById('incomeDate').value;
            if (!incomeDate) {
                document.getElementById('dateError').classList.add('show');
                isValid = false;
            }

            // Income Name validation
            const incomeName = document.getElementById('incomeName').value.trim();
            if (!incomeName) {
                document.getElementById('incomeNameError').classList.add('show');
                isValid = false;
            }

            // Income From validation
            const incomeFrom = document.getElementById('incomeFrom').value.trim();
            if (!incomeFrom) {
                document.getElementById('incomeFromError').classList.add('show');
                isValid = false;
            }

            // Transaction validation
            const transaction = transactionSelect.value;
            if (!transaction) {
                document.getElementById('transactionError').classList.add('show');
                isValid = false;
            }

            // Amount validation
            const amount = parseFloat(document.getElementById('amount').value);
            if (isNaN(amount) || amount <= 0) {
                document.getElementById('amountError').classList.add('show');
                isValid = false;
            }

            return isValid;
        }

        // ======================== RESET FORM ========================
        function resetIncomeForm() {
            document.getElementById('incomeForm').reset();
            document.getElementById('incomeDate').value = todayDate;
            document.getElementById('incomeDate').setAttribute('max', todayDate);
            transactionSelect.value = '';
            upiField.classList.remove('show');
            bankField.classList.remove('show');
            document.getElementById('fileStatus').classList.remove('show');
            document.getElementById('otherTransactionId').value = '';
            document.getElementById('note').value = '';
            
            // Clear error messages
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
            });
            
            // Reload SR number
            updateSrNo();
        }

        // ======================== SUBMIT FORM ========================
        document.getElementById('incomeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!validateIncomeForm()) {
                return;
            }

            const loading = document.getElementById('loading');
            loading.classList.add('active');

            try {
                const formData = new FormData();
                
                // Add configuration
                formData.append('spreadsheetId', SPREADSHEET_ID);
                formData.append('sheetName', INCOME_SHEET_NAME);
                formData.append('driveFolderId', DRIVE_FOLDER_ID);
                formData.append('action', 'insert');
                
                // Add form fields matching Google Sheet headers exactly
                // Headers: Sr. No, Date, Income Name, Income From, Transaction, 
                // Bank Transaction Id, UPI Transaction Id, Other Transaction Id, Amount, File, Note
                
                const srNo = document.getElementById('srNo').value;
                const incomeDate = document.getElementById('incomeDate').value;
                const incomeName = document.getElementById('incomeName').value;
                const incomeFrom = document.getElementById('incomeFrom').value;
                const transaction = transactionSelect.value;
                const bankTxnId = document.getElementById('bankTransactionId').value || '';
                const upiTxnId = document.getElementById('upiTransactionId').value || '';
                const otherTxnId = document.getElementById('otherTransactionId').value || '';
                const amount = document.getElementById('amount').value;
                const note = document.getElementById('note').value;
                
                formData.append('Sr. No', srNo);
                formData.append('Date', incomeDate);
                formData.append('Income Name', incomeName);
                formData.append('Income From', incomeFrom);
                formData.append('Transaction', transaction);
                formData.append('Bank Transaction Id', bankTxnId);
                formData.append('UPI Transaction Id', upiTxnId);
                formData.append('Other Transaction Id', otherTxnId);
                formData.append('Amount', amount);
                formData.append('Note', note);
                
                // Handle file upload (Column 'File')
                let fileCount = 0;
                const fileInput = document.getElementById('incomeFile');
                if (fileInput.files && fileInput.files[0]) {
                    const file = fileInput.files[0];
                    const fileData = await fileToBase64(file);
                    fileCount = 1;
                    formData.append('fileData1', fileData);
                    formData.append('fileName1', file.name);
                    formData.append('fileType1', file.type);
                    formData.append('fileColumn1', 'File'); // Exact header column name
                }
                formData.append('fileCount', fileCount);

                // Log for debugging
                console.log('Submitting income with fileCount:', fileCount);
                console.log('Income Name:', incomeName);
                console.log('Income From:', incomeFrom);

                // Submit to Google Apps Script
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                console.log('Server response:', result);
                
                if (result.status === 'success') {
                    let successMsg = `✅ Income record saved successfully!\n`;
                    if (result.data && result.data.imageLinks && result.data.imageLinks.length > 0) {
                        successMsg += `📁 Uploaded ${result.data.imageLinks.length} file(s) to Google Drive\n`;
                        successMsg += `🔗 File link has been saved in the Google Sheet.`;
                    } else if (fileCount > 0) {
                        successMsg += `📄 Document uploaded to Google Drive and linked to the sheet.`;
                    } else {
                        successMsg += `ℹ️ No document was uploaded.`;
                    }
                    document.getElementById('successMessage').textContent = successMsg;
                    document.getElementById('successMessage').style.display = 'block';
                    
                    // Reset form after successful submission
                    setTimeout(() => {
                        resetIncomeForm();
                        document.getElementById('successMessage').style.display = 'none';
                        // Reload SR number
                        updateSrNo();
                    }, 4000);
                } else {
                    throw new Error(result.message || 'Unknown error occurred');
                }
            } catch (error) {
                console.error('Error details:', error);
                document.getElementById('errorMessage').textContent = '❌ Error: ' + error.message;
                document.getElementById('errorMessage').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMessage').style.display = 'none';
                }, 5000);
            } finally {
                loading.classList.remove('active');
            }
        });

        // Auto-capitalize first letter of Income Name and Income From (optional UX enhancement)
        document.getElementById('incomeName').addEventListener('input', function(e) {
            let words = this.value.split(' ');
            words = words.map(word => {
                if (word.length > 0) {
                    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                }
                return word;
            });
            this.value = words.join(' ');
        });

        document.getElementById('incomeFrom').addEventListener('input', function(e) {
            let words = this.value.split(' ');
            words = words.map(word => {
                if (word.length > 0) {
                    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                }
                return word;
            });
            this.value = words.join(' ');
        });

        // Real-time amount validation
        document.getElementById('amount').addEventListener('input', function(e) {
            if (this.value < 0) this.value = 0;
        });
    </script>
</body>
</html>
