<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Expenses Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }
        
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
            padding-bottom: 60px;
        }

        .action-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            justify-content: space-between;
        }

        .search-container {
            flex: 2;
            position: relative;
            min-width: 250px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #7f8c8d;
        }

        .search-clear {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #95a5a6;
            display: none;
            font-size: 18px;
            background: none;
            border: none;
        }

        .search-clear:hover {
            color: #e74c3c;
        }

        .search-result-count {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 8px;
            display: none;
        }

        .btn-refresh {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh:hover {
            background: #1e3c72;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 82, 152, 0.3);
        }

        .btn-add {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        @media (max-width: 768px) {
            .action-bar {
                flex-direction: column;
                gap: 12px;
            }
            
            .button-group {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                width: 100%;
            }
            
            .btn-refresh, .btn-add {
                width: 100%;
                justify-content: center;
                padding: 14px;
                font-size: 16px;
            }
            
            .search-container {
                width: 100%;
                order: 3;
            }
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e1e8ed;
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #1e3c72;
            border-bottom: 2px solid #e1e8ed;
            font-size: 14px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e1e8ed;
            color: #34495e;
            font-size: 14px;
        }

        tr:hover {
            background: #f8fafc;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-view {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-view:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-update {
            background: #f39c12;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-update:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .btn-view, .btn-update {
                padding: 10px 14px;
                font-size: 13px;
                flex: 1;
                justify-content: center;
            }
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-delete:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .btn-submit {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .modal-content {
            background-color: white;
            margin: 0;
            padding: 0;
            border-radius: 0;
            width: 100%;
            min-height: 100vh;
            animation: slideUp 0.3s ease;
        }

        .alert-modal-content {
            background-color: white;
            margin: 20% auto;
            padding: 0;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: scaleIn 0.3s ease;
            min-height: auto;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            transform: scale(1.1);
        }

        .modal-body {
            padding: 25px;
            max-height: calc(100vh - 70px);
            overflow-y: auto;
        }

        .modal-footer {
            padding: 15px 25px;
            border-top: 1px solid #e1e8ed;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: sticky;
            bottom: 0;
            background: white;
        }

        .alert-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .alert-content {
            background: white;
            border-radius: 20px;
            padding: 0;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: scaleIn 0.3s ease;
        }

        .alert-header {
            padding: 20px;
            border-radius: 20px 20px 0 0;
            font-size: 24px;
        }

        .alert-header.success {
            background: #27ae60;
            color: white;
        }

        .alert-header.error {
            background: #e74c3c;
            color: white;
        }

        .alert-header.warning {
            background: #f39c12;
            color: white;
        }

        .alert-body {
            padding: 30px 20px;
            font-size: 16px;
            color: #333;
        }

        .alert-footer {
            padding: 15px 20px;
            border-top: 1px solid #e1e8ed;
        }

        .alert-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
        }

        .details-table tr {
            border-bottom: 1px solid #e1e8ed;
        }

        .details-table td {
            padding: 12px;
        }

        .details-table td:first-child {
            font-weight: 600;
            width: 35%;
            background: #f8fafc;
            color: #1e3c72;
        }

        .details-table td:last-child {
            width: 65%;
            color: #34495e;
            word-break: break-word;
        }

        .update-form {
            display: grid;
            gap: 20px;
        }

        .form-row {
            display: grid;
            gap: 10px;
        }

        .form-row label {
            font-weight: 600;
            color: #1e3c72;
            font-size: 14px;
        }

        .form-row input, .form-row textarea, .form-row select {
            padding: 10px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-row input:focus, .form-row select:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        .file-link {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }

        .file-link:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2a5298;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .back-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #7f8c8d;
            transform: translateX(-5px);
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .file-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e1e8ed;
        }

        .current-file {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <h2>💰 Expenses Management System</h2>
            <p>Track, Manage and Control Business Expenses</p>
        </div>

        <div class="content">
            <!-- Page 1: View All Expenses -->
            <div id="page1" class="page active">
                <div class="action-bar">
                    <div class="button-group">
                        <button class="btn-refresh" onclick="loadExpenses()">🔄 Refresh</button>
                        <button class="btn-add" onclick="openAddExpenseModal()">➕ Add New Expense</button>
                    </div>
                    <div class="search-container">
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="searchInput" placeholder="Search by Expenses Name, Driver Name or Amount...">
                            <button class="search-clear" id="searchClear" onclick="clearSearch()">✖</button>
                        </div>
                        <div class="search-result-count" id="searchResultCount"></div>
                    </div>
                </div>
                <div class="table-container">
                    <table id="expensesTable">
                        <thead>
                            <tr><th>Sr. No</th><th>Date</th><th>Expenses Name</th><th>Amount</th><th>Action</th></tr>
                        </thead>
                        <tbody id="expensesTableBody"><tr><td colspan="5" class="no-data">Loading data...</td></tr></tbody>
                    </table>
                </div>
            </div>

            <!-- Page 2: Update Expense -->
            <div id="page2" class="page">
                <button class="back-btn" onclick="goToPage1()">← Back to Expenses List</button>
                <div class="table-container">
                    <div id="updateFormContainer" style="padding: 20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- View Details Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>📄 Expense Details</h2><button class="close-modal" onclick="closeModal()">&times;</button></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer"><button class="btn-delete" onclick="confirmDeleteExpense()">🗑 Delete Expense</button><button class="btn-cancel" onclick="closeModal()">Close</button></div>
        </div>
    </div>

    <!-- Add Expense Modal (full width) -->
    <div id="addExpenseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>➕ Add New Expense</h2><button class="close-modal" onclick="closeAddExpenseModal()">&times;</button></div>
            <div class="modal-body" id="addExpenseModalBody"><iframe id="expenseFormIframe" src="Expenses.html" style="width:100%; height:calc(100vh - 80px); border:none;"></iframe></div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alertModal" class="alert-modal"><div class="alert-content"><div class="alert-header" id="alertHeader"></div><div class="alert-body" id="alertMessage"></div><div class="alert-footer"><button class="alert-btn" onclick="closeAlertModal()">OK</button></div></div></div>

    <script>
        const SPREADSHEET_ID = '1bopVE4D9z0fMwBWq0NGSIGuGYjqG0iIWQNxeFtguUvc';
        const EXPENSES_SHEET_NAME = 'Expenses';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5NBh26tyNs3Ae7UiyBThu8tTV3xFV21pJR16WnPBXnNvzKRyyLYKsmShdln9yRRexUA/exec';
        const DRIVE_FOLDER_ID = '1I-FRUe_xUhx7CD1h6--vZmBGtCm13bah';

        let expensesData = [];
        let currentExpense = null;
        let currentRowIndex = null;
        let currentSearchTerm = '';

        function safeString(val) { return val === null || val === undefined ? '' : String(val); }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function formatDateDMY(dateStr) {
            if (!dateStr) return '-';
            try {
                if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
                    const parts = dateStr.split('T')[0].split('-');
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}/)) return dateStr;
                const d = new Date(dateStr);
                if (!isNaN(d)) return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
                return dateStr;
            } catch(e) { return dateStr; }
        }

        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            try {
                if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}/)) {
                    const parts = dateStr.split('/');
                    return `${parts[2]}-${parts[1]}-${parts[0]}`;
                }
                if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) return dateStr.split('T')[0];
                const d = new Date(dateStr);
                if (!isNaN(d)) return d.toISOString().split('T')[0];
                return '';
            } catch(e) { return ''; }
        }

        async function loadExpenses() {
            showLoading();
            try {
                const res = await fetch(`${SCRIPT_URL}?spreadsheetId=${SPREADSHEET_ID}&sheetName=${EXPENSES_SHEET_NAME}`);
                const result = await res.json();
                if (result.status === 'success' && result.data) {
                    expensesData = result.data;
                    if (currentSearchTerm) performSearch(currentSearchTerm);
                    else displayExpenses(expensesData);
                } else throw new Error(result.message || 'Failed to load');
            } catch(err) {
                document.getElementById('expensesTableBody').innerHTML = '<tr><td colspan="5" class="no-data">Error loading data. Please refresh.</td></tr>';
                showAlert(err.message, 'error');
            } finally { hideLoading(); }
        }

        function displayExpenses(data) {
            const tbody = document.getElementById('expensesTableBody');
            if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="no-data">No expenses found.</td></tr>'; return; }
            let html = '';
            data.forEach((exp, idx) => {
                const srNo = idx+1;
                const date = formatDateDMY(safeString(exp['Date']));
                const expName = safeString(exp['Expenses Name']) || '-';
                const amount = safeString(exp['Amount']) || '0';
                html += `<tr><td>${srNo}</td><td>${escapeHtml(date)}</td><td><strong>${escapeHtml(expName)}</strong></td><td>₹ ${escapeHtml(amount)}</td><td><div class="action-buttons"><button class="btn-view" onclick="viewExpense(${idx})">👁️ View</button><button class="btn-update" onclick="updateExpense(${idx})">✏️ Update</button></div></td></tr>`;
            });
            tbody.innerHTML = html;
        }

        function performSearch(term) {
            currentSearchTerm = term;
            const clearBtn = document.getElementById('searchClear');
            const resultDiv = document.getElementById('searchResultCount');
            if (term && term.trim()) {
                clearBtn.style.display = 'block';
                const lowerTerm = term.toLowerCase().trim();
                const filtered = expensesData.filter(exp => safeString(exp['Expenses Name']).toLowerCase().includes(lowerTerm) || safeString(exp['Expenses For']).toLowerCase().includes(lowerTerm) || safeString(exp['Amount']).includes(lowerTerm));
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `Found ${filtered.length} result(s) for "${escapeHtml(term)}"`;
                displayExpenses(filtered);
            } else {
                clearBtn.style.display = 'none';
                resultDiv.style.display = 'none';
                displayExpenses(expensesData);
            }
        }

        function clearSearch() { document.getElementById('searchInput').value = ''; performSearch(''); }

        function viewExpense(index) {
            if (!expensesData[index]) { showAlert('Expense not found!', 'error'); return; }
            currentExpense = expensesData[index];
            currentRowIndex = index + 2;
            const modalBody = document.getElementById('modalBody');
            const fields = ['Sr. No','Date','Expenses Name','Expenses For','Transaction','Bank Transaction Id','UPI Transaction Id','Other Transaction Id','Amount','Note'];
            let html = '<table class="details-table">';
            fields.forEach(f => {
                let val = safeString(currentExpense[f]);
                if (f === 'Date') val = formatDateDMY(val);
                if (val === '') val = '-';
                html += `<tr><td>${f}</td><td>${escapeHtml(val)}</td></tr>`;
            });
            const fileVal = safeString(currentExpense['File']);
            if (fileVal && fileVal !== '-') {
                html += `<tr><td>File</td><td><a href="${fileVal}" target="_blank" class="file-link">📄 View File</a> <button class="btn-file-view" onclick="window.open('${fileVal}','_blank')">🔗 Open</button></td></tr>`;
            } else html += `<tr><td>File</td><td>-</td></tr>`;
            html += '</table>';
            modalBody.innerHTML = html;
            document.getElementById('viewModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function confirmDeleteExpense() {
            closeModal();
            showAlertWithCallback('Are you sure you want to delete this expense record?', 'warning', async () => {
                showLoading();
                try {
                    const fd = new FormData();
                    fd.append('spreadsheetId', SPREADSHEET_ID);
                    fd.append('sheetName', EXPENSES_SHEET_NAME);
                    fd.append('action', 'delete');
                    fd.append('rowIndex', currentRowIndex);
                    const res = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                    const result = await res.json();
                    if (result.status === 'success') {
                        showAlert('✅ Expense deleted successfully!', 'success');
                        loadExpenses();
                    } else throw new Error(result.message);
                } catch(err) { showAlert('Error: '+err.message, 'error'); }
                finally { hideLoading(); }
            });
        }

        function updateExpense(index) {
            if (!expensesData[index]) { showAlert('Expense not found!', 'error'); return; }
            currentExpense = expensesData[index];
            currentRowIndex = index + 2;
            const container = document.getElementById('updateFormContainer');
            const transactionType = safeString(currentExpense['Transaction']);
            let html = '<h3 style="color:#1e3c72; margin-bottom:20px;">✏️ Update Expense Details</h3><div class="update-form"><div class="form-grid-2">';
            
            const fields = [
                { label:'Date', name:'Date', type:'date', required:false },
                { label:'Expenses Name', name:'Expenses Name', type:'text' },
                { label:'Expenses For (Driver Name)', name:'Expenses For', type:'text' },
                { label:'Transaction Type', name:'Transaction', type:'select', options:['UPI','Bank Transfer','Cash'] },
                { label:'Bank Transaction Id', name:'Bank Transaction Id', type:'text', condition:'Bank Transfer' },
                { label:'UPI Transaction Id', name:'UPI Transaction Id', type:'text', condition:'UPI' },
                { label:'Other Transaction Id', name:'Other Transaction Id', type:'text', condition:'Cash' },
                { label:'Amount', name:'Amount', type:'number', step:'0.01' },
                { label:'Note', name:'Note', type:'textarea', rows:2 }
            ];
            
            fields.forEach(f => {
                let val = safeString(currentExpense[f.name]);
                if (f.name === 'Date') val = formatDateForInput(val);
                html += `<div class="form-row"><label>${f.label}</label>`;
                if (f.type === 'select') {
                    html += `<select id="update_${f.name.replace(/\s/g,'_')}" onchange="toggleTransactionFields()">${f.options.map(opt => `<option value="${opt}" ${transactionType===opt ? 'selected' : ''}>${opt}</option>`).join('')}</select>`;
                } else if (f.type === 'textarea') {
                    html += `<textarea id="update_${f.name.replace(/\s/g,'_')}" rows="${f.rows}">${escapeHtml(val)}</textarea>`;
                } else {
                    html += `<input type="${f.type}" id="update_${f.name.replace(/\s/g,'_')}" value="${escapeHtml(val)}" ${f.step ? `step="${f.step}"` : ''}>`;
                }
                html += `</div>`;
            });
            
            html += `<div class="form-row"><label>File</label><input type="file" id="update_file" accept=".pdf,.jpg,.jpeg,.png"><div class="current-file" id="currentFileDiv"><a href="${safeString(currentExpense['File'])}" target="_blank" class="file-link">📄 Current File</a></div><input type="hidden" id="existingFile" value="${escapeHtml(safeString(currentExpense['File']))}"></div>`;
            html += `</div><div style="display:flex; gap:10px; justify-content:flex-end; margin-top:30px;"><button class="btn-cancel" onclick="goToPage1()">Cancel</button><button class="btn-submit" id="updateSubmitBtn">💾 Update Expense</button></div></div>`;
            container.innerHTML = html;
            toggleTransactionFields();
            document.getElementById('updateSubmitBtn').addEventListener('click', handleUpdateExpense);
            goToPage2();
        }

        window.toggleTransactionFields = function() {
            const transType = document.getElementById('update_Transaction')?.value;
            const bankRow = document.querySelector('#update_Bank_Transaction_Id')?.closest('.form-row');
            const upiRow = document.querySelector('#update_UPI_Transaction_Id')?.closest('.form-row');
            const otherRow = document.querySelector('#update_Other_Transaction_Id')?.closest('.form-row');
            if(bankRow) bankRow.style.display = transType === 'Bank Transfer' ? 'grid' : 'none';
            if(upiRow) upiRow.style.display = transType === 'UPI' ? 'grid' : 'none';
            if(otherRow) otherRow.style.display = transType === 'Cash' ? 'grid' : 'none';
        };

        async function handleUpdateExpense() {
            showLoading();
            try {
                const fd = new FormData();
                fd.append('spreadsheetId', SPREADSHEET_ID);
                fd.append('sheetName', EXPENSES_SHEET_NAME);
                fd.append('action', 'update');
                fd.append('rowIndex', currentRowIndex);
                fd.append('driveFolderId', DRIVE_FOLDER_ID);
                
                const fieldNames = ['Date','Expenses Name','Expenses For','Transaction','Bank Transaction Id','UPI Transaction Id','Other Transaction Id','Amount','Note'];
                for(let f of fieldNames) {
                    const el = document.getElementById(`update_${f.replace(/\s/g,'_')}`);
                    if(el) fd.append(f, el.value);
                }
                
                const fileInput = document.getElementById('update_file');
                if(fileInput && fileInput.files && fileInput.files[0]) {
                    const file = fileInput.files[0];
                    const reader = new FileReader();
                    const base64 = await new Promise(resolve => { reader.onload = e => resolve(e.target.result.split(',')[1]); reader.readAsDataURL(file); });
                    fd.append('fileData1', base64);
                    fd.append('fileName1', file.name);
                    fd.append('fileType1', file.type);
                    fd.append('fileColumn1', 'File');
                    fd.append('fileCount', '1');
                } else {
                    const existing = document.getElementById('existingFile')?.value;
                    if(existing) fd.append('File', existing);
                    fd.append('fileCount', '0');
                }
                
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                const result = await res.json();
                if(result.status === 'success') {
                    showAlert('✅ Expense updated successfully!', 'success');
                    setTimeout(() => { goToPage1(); loadExpenses(); }, 1500);
                } else throw new Error(result.message);
            } catch(err) { showAlert('Error: '+err.message, 'error'); }
            finally { hideLoading(); }
        }

        function openAddExpenseModal() {
            const modal = document.getElementById('addExpenseModal');
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            const iframe = document.getElementById('expenseFormIframe');
            if(iframe) iframe.src = iframe.src;
        }
        function closeAddExpenseModal() { document.getElementById('addExpenseModal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        function goToPage1() { document.getElementById('page1').classList.add('active'); document.getElementById('page2').classList.remove('active'); loadExpenses(); }
        function goToPage2() { document.getElementById('page1').classList.remove('active'); document.getElementById('page2').classList.add('active'); window.scrollTo(0,0); }
        function closeModal() { document.getElementById('viewModal').style.display = 'none'; document.body.style.overflow = 'auto'; currentExpense = null; }
        function showLoading() { document.getElementById('loading').classList.add('active'); }
        function hideLoading() { document.getElementById('loading').classList.remove('active'); }
        
        function showAlert(msg, type) {
            const alertModal = document.getElementById('alertModal');
            const header = document.getElementById('alertHeader');
            const msgDiv = document.getElementById('alertMessage');
            header.className = 'alert-header ' + type;
            header.innerHTML = type==='success'?'✅ Success!':(type==='error'?'❌ Error!':'⚠️ Warning!');
            msgDiv.innerHTML = msg;
            alertModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            if(type === 'success') setTimeout(() => closeAlertModal(), 2000);
        }
        
        function showAlertWithCallback(msg, type, callback) {
            const alertModal = document.getElementById('alertModal');
            const header = document.getElementById('alertHeader');
            const msgDiv = document.getElementById('alertMessage');
            const footer = document.querySelector('#alertModal .alert-footer');
            header.className = 'alert-header ' + type;
            header.innerHTML = type==='success'?'✅ Success!':(type==='error'?'❌ Error!':'⚠️ Warning!');
            msgDiv.innerHTML = msg;
            footer.innerHTML = `<button class="alert-btn" style="background:#e74c3c;" onclick="executeCallbackAndClose()">Delete</button><button class="alert-btn" onclick="closeAlertModal()">Cancel</button>`;
            window.pendingCallback = callback;
            alertModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        
        window.executeCallbackAndClose = function() {
            closeAlertModal();
            if(window.pendingCallback) window.pendingCallback();
            delete window.pendingCallback;
        };
        
        function closeAlertModal() {
            document.getElementById('alertModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            const footer = document.querySelector('#alertModal .alert-footer');
            footer.innerHTML = `<button class="alert-btn" onclick="closeAlertModal()">OK</button>`;
        }
        
        window.onclick = function(e) {
            if(e.target === document.getElementById('viewModal')) closeModal();
            if(e.target === document.getElementById('addExpenseModal')) closeAddExpenseModal();
            if(e.target === document.getElementById('alertModal')) closeAlertModal();
        };
        
        document.getElementById('searchInput').addEventListener('input', function(e) { performSearch(e.target.value); });
        window.onload = () => loadExpenses();
    </script>
</body>
</html>
