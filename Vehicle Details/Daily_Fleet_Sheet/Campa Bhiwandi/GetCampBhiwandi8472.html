<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <h2>🚛 CamBhiwandi Details Vehicle 8472</h2>
            <p>Manage Trip Records with Automatic Calculations & Dropdown Selections</p>
        </div>

        <div class="content">
            <div id="page1" class="page active">
                <div class="action-bar">
                    <div class="button-group">
                        <button class="btn-refresh" onclick="loadTrips()">🔄 Refresh</button>
                        <button class="btn-add" onclick="openAddTripModal()">➕ Add New Vehicle</button>
                    </div>
                    <div class="search-container">
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="searchInput" placeholder="Search by LR No, Driver Name...">
                            <button class="search-clear" id="searchClear" onclick="clearSearch()">✖</button>
                        </div>
                        <div class="search-result-count" id="searchResultCount"></div>
                    </div>
                </div>
                <div class="table-container">
                    <table id="tripsTable">
                        <thead>
                            <tr><th>Sr. No</th><th>DATE</th><th>LR NO</th><th>DRIVER NAME</th><th>Action</th></tr>
                        </thead>
                        <tbody id="tripsTableBody"><tr><td colspan="5" class="no-data">Loading data...</td></tr></tbody>
                    </table>
                </div>
            </div>

            <div id="page2" class="page">
                <button class="back-btn" onclick="goToPage1()">← Back to Trip List</button>
                <div class="table-container">
                    <div id="updateFormContainer" style="padding: 20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>📄 Trip Details</h2><button class="close-modal" onclick="closeModal()">&times;</button></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer"><button class="btn-delete" onclick="confirmDeleteTrip()">🗑 Delete Trip</button><button class="btn-cancel" onclick="closeModal()">Close</button></div>
        </div>
    </div>

    <div id="addTripModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>➕ Add New Trip</h2><button class="close-modal" onclick="closeAddTripModal()">&times;</button></div>
            <div class="modal-body"><iframe id="tripFormIframe" src="CamBhiwandi3140.html" title="Trip Entry Form"></iframe></div>
        </div>
    </div>

    <div id="alertModal" class="alert-modal"><div class="alert-content"><div class="alert-header" id="alertHeader"></div><div class="alert-body" id="alertMessage"></div><div class="alert-footer"><button class="alert-btn" onclick="closeAlertModal()">OK</button></div></div></div>

    <script>
        const SPREADSHEET_ID = '1FD2a8gQnymefWKmp0A4A0LTtVtuPZ0DXVaN-JK0sRCs';
        const SPREADSHEET_NAME = 'CamBhiwandi_8472';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5NBh26tyNs3Ae7UiyBThu8tTV3xFV21pJR16WnPBXnNvzKRyyLYKsmShdln9yRRexUA/exec';
        const DRIVE_FOLDER_ID = '1KCS4l-0n8D-kjaZYmAHJsPKGT_7aj4b4';

        let tripsData = [];
        let currentTrip = null;
        let currentRowIndex = null;
        let currentSearchTerm = '';

        function safeString(val) { return val === null || val === undefined ? '' : String(val); }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function formatDateDMY(dateStr) {
            if (!dateStr) return '-';
            try {
                if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
                    const parts = dateStr.split('T')[0].split('-');
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}/)) return dateStr;
                const d = new Date(dateStr);
                if (!isNaN(d)) return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
                return dateStr;
            } catch(e) { return dateStr; }
        }

        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            try {
                if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}/)) {
                    const parts = dateStr.split('/');
                    return `${parts[2]}-${parts[1]}-${parts[0]}`;
                }
                if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) return dateStr.split('T')[0];
                const d = new Date(dateStr);
                if (!isNaN(d)) return d.toISOString().split('T')[0];
                return '';
            } catch(e) { return ''; }
        }

        async function loadTrips() {
            showLoading();
            try {
                const res = await fetch(`${SCRIPT_URL}?spreadsheetId=${SPREADSHEET_ID}&sheetName=${SPREADSHEET_NAME}`);
                const result = await res.json();
                if (result.status === 'success' && result.data) {
                    tripsData = result.data;
                    if (currentSearchTerm) performSearch(currentSearchTerm);
                    else displayTrips(tripsData);
                } else throw new Error(result.message || 'Failed to load');
            } catch(err) {
                document.getElementById('tripsTableBody').innerHTML = `<tr><td colspan="5" class="no-data">Error loading data. Please refresh.</td></tr>`;
                showAlert(err.message, 'error');
            } finally { hideLoading(); }
        }

        function displayTrips(data) {
            const tbody = document.getElementById('tripsTableBody');
            if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="no-data">No trip records found.</td></tr>'; return; }
            let html = '';
            data.forEach((trip, idx) => {
                const srNo = idx + 1;
                const date = formatDateDMY(safeString(trip['DATE']));
                const lrNo = safeString(trip['LR NO']) || '-';
                const driverName = safeString(trip['DRIVER NAME']) || '-';
                html += `<tr><td>${srNo}</td><td>${escapeHtml(date)}</td><td><strong>${escapeHtml(lrNo)}</strong></td><td>${escapeHtml(driverName)}</td><td><div class="action-buttons"><button class="btn-view" onclick="viewTrip(${idx})">👁️ View</button><button class="btn-update" onclick="updateTrip(${idx})">✏️ Update</button></div></td></tr>`;
            });
            tbody.innerHTML = html;
        }

        function performSearch(term) {
            currentSearchTerm = term;
            const clearBtn = document.getElementById('searchClear');
            const resultDiv = document.getElementById('searchResultCount');
            if (term && term.trim()) {
                clearBtn.style.display = 'block';
                const lowerTerm = term.toLowerCase().trim();
                const filtered = tripsData.filter(trip => safeString(trip['LR NO']).toLowerCase().includes(lowerTerm) || safeString(trip['DRIVER NAME']).toLowerCase().includes(lowerTerm));
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `Found ${filtered.length} result(s) for "${escapeHtml(term)}"`;
                displayTrips(filtered);
            } else {
                clearBtn.style.display = 'none';
                resultDiv.style.display = 'none';
                displayTrips(tripsData);
            }
        }

        function clearSearch() { document.getElementById('searchInput').value = ''; performSearch(''); }

        function viewTrip(index) {
            if (!tripsData[index]) { showAlert('Trip record not found!', 'error'); return; }
            currentTrip = tripsData[index];
            currentRowIndex = index + 2;
            const modalBody = document.getElementById('modalBody');
            const fields = ['SL','DATE','LR NO','VEHICLE NO','DRIVER NAME','MILEAGE','DESTINATION','OPENING KM','CLOSING KM','KM','CNG OR DIESEL RATE','AMOUNT', 'TRIP ADVANCE','L and UL','DRIVER BATA','OTHER EXP','TOTAL AMOUNT','ACTUAL INDENT','OTHER EXP REMARKS','POD STATUS','NOTE','DRIVER DIFFERENCE AMOUNT'];
            let html = '<table class="details-table">';
            fields.forEach(f => {
                let val = safeString(currentTrip[f]);
                if (f === 'DATE') val = formatDateDMY(val);
                if (val === '') val = '-';
                html += `<tr><td>${f}</td><td>${escapeHtml(val)}</td></tr>`;
            });
            const fileVal = safeString(currentTrip['FILE']);
            if (fileVal && fileVal !== '-') {
                html += `<tr><td>FILE</td><td><a href="${fileVal}" target="_blank" class="file-link">📄 View File</a> <button class="btn-file-view" onclick="window.open('${fileVal}','_blank')">🔗 Open</button></td></tr>`;
            } else html += `<tr><td>FILE</td><td>-</td></tr>`;
            html += '</table>';
            modalBody.innerHTML = html;
            document.getElementById('viewModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function confirmDeleteTrip() {
            closeModal();
            showAlertWithCallback('Are you sure you want to delete this trip record?', 'warning', async () => {
                showLoading();
                try {
                    const fd = new FormData();
                    fd.append('spreadsheetId', SPREADSHEET_ID);
                    fd.append('sheetName', SPREADSHEET_NAME);
                    fd.append('action', 'delete');
                    fd.append('rowIndex', currentRowIndex);
                    const res = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                    const result = await res.json();
                    if (result.status === 'success') {
                        showAlert('✅ Trip record deleted successfully!', 'success');
                        loadTrips();
                    } else throw new Error(result.message);
                } catch(err) { showAlert('Error: '+err.message, 'error'); }
                finally { hideLoading(); }
            });
        }

        // FIXED: Correct calculateAllFields function with proper L and UL field ID
        function calculateAllFields() {
            const openingKM = parseFloat(document.getElementById('update_OPENING_KM')?.value) || 0;
            const closingKM = parseFloat(document.getElementById('update_CLOSING_KM')?.value) || 0;
            const km = Math.round(Math.max(0, closingKM - openingKM));
            const kmField = document.getElementById('update_KM');
            if (kmField) kmField.value = km;
            
            const mileage = document.getElementById('update_MILEAGE')?.value;
            const rate = parseFloat(document.getElementById('update_CNG_OR_DIESEL_RATE')?.value) || 0;
            let amount = 0;
            
            if (mileage !== 'FIX' && parseFloat(mileage) > 0 && km > 0) {
                amount = Math.round((km / parseFloat(mileage)) * rate);
            } else if (mileage === 'FIX') {
                amount = Math.round(parseFloat(document.getElementById('update_AMOUNT')?.value) || 0);
            }
            const amountField = document.getElementById('update_AMOUNT');
            if (amountField) amountField.value = amount;
            
            // CRITICAL FIX: Using correct ID 'update_L_and_UL' instead of 'update_L_UL'
            const lul = parseFloat(document.getElementById('update_L_and_UL')?.value) || 0;
			 const TripAdv = parseFloat(document.getElementById('update_TRIP_ADVANCE')?.value) || 0;
            const driverBata = parseFloat(document.getElementById('update_DRIVER_BATA')?.value) || 0;
            const otherExp = parseFloat(document.getElementById('update_OTHER_EXP')?.value) || 0;
            
            // Calculate TOTAL AMOUNT = AMOUNT + L and UL + TRIP ADVANCE + DRIVER BATA + OTHER EXP
            const totalAmount = amount + lul + TripAdv + driverBata + otherExp;
            const totalAmountField = document.getElementById('update_TOTAL_AMOUNT');
            if (totalAmountField) totalAmountField.value = Math.round(totalAmount);
            
            const actualIndent = parseFloat(document.getElementById('update_ACTUAL_INDENT')?.value) || 0;
            const driverDifference = actualIndent - totalAmount;
            const driverDiffField = document.getElementById('update_DRIVER_DIFFERENCE_AMOUNT');
            if (driverDiffField) driverDiffField.value = Math.round(driverDifference);
            
            // Debug log to verify values
            console.log('Calculation Debug:', { amount, lul, TripAdv, driverBata, otherExp, totalAmount });
        }

        function handleMileageChange() {
            const mileage = document.getElementById('update_MILEAGE')?.value;
            const amountField = document.getElementById('update_AMOUNT');
            if (mileage === 'FIX') {
                if (amountField) {
                    amountField.readOnly = false;
                    amountField.style.background = 'white';
                }
            } else {
                if (amountField) {
                    amountField.readOnly = true;
                    amountField.style.background = '#f8fafc';
                }
                calculateAllFields();
            }
        }

        function validateDate(input) {
            if (input.value) {
                const selectedDate = new Date(input.value);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                if (selectedDate > today) {
                    input.value = '';
                    showAlert('Future date is not allowed!', 'warning');
                }
            }
        }

        async function fetchDropdownOptions() {
            try {
                const res = await fetch(`${SCRIPT_URL}?spreadsheetId=${SPREADSHEET_ID}&sheetName=${SPREADSHEET_NAME}`);
                const result = await res.json();
                if (result.status === 'success' && result.data) {
                    const vehicles = [...new Set(result.data.map(t => safeString(t['VEHICLE NO'])).filter(v => v && v !== '-'))];
                    const drivers = [...new Set(result.data.map(d => safeString(d['DRIVER NAME'])).filter(d => d && d !== '-'))];
                    return { vehicles, drivers };
                }
                return { vehicles: [], drivers: [] };
            } catch(e) { return { vehicles: [], drivers: [] }; }
        }

        async function updateTrip(index) {
            if (!tripsData[index]) { showAlert('Trip record not found!', 'error'); return; }
            showLoading();
            currentTrip = tripsData[index];
            currentRowIndex = index + 2;
            
            try {
                const { vehicles, drivers } = await fetchDropdownOptions();
                
                const container = document.getElementById('updateFormContainer');
                let html = '<h3 style="color:#1e3c72; margin-bottom:20px;">✏️ Update Trip Details</h3><div class="update-form"><div class="form-grid-2">';
                
                const fields = [
                    { label:'DATE', name:'DATE', type:'date' },
                    { label:'LR NO', name:'LR NO', type:'text' },
                    { label:'VEHICLE NO', name:'VEHICLE NO', type:'text' },
                    { label:'DRIVER NAME', name:'DRIVER NAME', type:'text' },
                    { label:'MILEAGE', name:'MILEAGE', type:'select', options:['FIX','4','5','6','7','8','9','10'] },
                    { label:'DESTINATION', name:'DESTINATION', type:'text' },
                    { label:'OPENING KM', name:'OPENING KM', type:'number', step:'1' },
                    { label:'CLOSING KM', name:'CLOSING KM', type:'number', step:'1' },
                    { label:'KM (Auto)', name:'KM', type:'number', readonly:true },
                    { label:'CNG OR DIESEL RATE', name:'CNG OR DIESEL RATE', type:'number', step:'0.01', value:'90.26' },
                    { label:'AMOUNT', name:'AMOUNT', type:'number', step:'1' },
                    { label:'L and UL', name:'L and UL', type:'number', step:'1' },
					{ label:'TRIP ADVANCE', name:'TRIP ADVANCE', type:'number', step:'1' },
                    { label:'DRIVER BATA', name:'DRIVER BATA', type:'number', step:'1' },
                    { label:'OTHER EXP', name:'OTHER EXP', type:'number', step:'1' },
                    { label:'TOTAL AMOUNT', name:'TOTAL AMOUNT', type:'number', readonly:true },
                    { label:'ACTUAL INDENT', name:'ACTUAL INDENT', type:'number', step:'1' },
                    { label:'OTHER EXP REMARKS', name:'OTHER EXP REMARKS', type:'text' },
                    { label:'POD STATUS', name:'POD STATUS', type:'text' },
                    { label:'NOTE', name:'NOTE', type:'textarea', rows:2 },
                    { label:'DRIVER DIFFERENCE AMOUNT', name:'DRIVER DIFFERENCE AMOUNT', type:'number', readonly:true }
                ];
                
                fields.forEach(f => {
                    let val = safeString(currentTrip[f.name]);
                    if (f.name === 'DATE') val = formatDateForInput(val);
                    let readonlyAttr = f.readonly ? 'readonly' : '';
                    let stepAttr = f.step ? `step="${f.step}"` : '';
                    let valueAttr = f.value && !val ? `value="${f.value}"` : `value="${escapeHtml(val)}"`;
                    
                    // Create safe ID by replacing spaces and special characters with underscores
                    const safeId = f.name.replace(/[&\s]/g, '_').replace(/_+/g, '_');
                    
                    html += `<div class="form-row"><label>${f.label}</label>`;
                    if (f.type === 'select') {
                        html += `<select id="update_${safeId}" onchange="handleMileageChange()">`;
                        f.options.forEach(opt => {
                            const selected = (val === opt) ? 'selected' : '';
                            html += `<option value="${opt}" ${selected}>${opt}</option>`;
                        });
                        html += `</select>`;
                    } else if (f.type === 'textarea') {
                        html += `<textarea id="update_${safeId}" rows="${f.rows}">${escapeHtml(val)}</textarea>`;
                    } else {
                        html += `<input type="${f.type}" id="update_${safeId}" ${valueAttr} ${stepAttr} ${readonlyAttr}>`;
                    }
                    html += `</div>`;
                });
                
                const currentFile = safeString(currentTrip['FILE']);
                html += `<div class="form-row"><label>FILE</label><input type="file" id="update_file" accept=".pdf,.jpg,.jpeg,.png"><div class="current-file">${currentFile ? `<a href="${currentFile}" target="_blank" class="file-link">📄 Current File</a>` : 'No file uploaded'}</div><input type="hidden" id="existingFile" value="${escapeHtml(currentFile)}"></div>`;
                html += `</div><div style="display:flex; gap:10px; justify-content:flex-end; margin-top:30px;"><button class="btn-cancel" onclick="goToPage1()">Cancel</button><button class="btn-submit" id="updateSubmitBtn">💾 Update Trip</button></div></div>`;
                container.innerHTML = html;
                
                // Setup datalists for dropdown suggestions
                if (vehicles.length > 0) {
                    const vehicleInput = document.getElementById('update_VEHICLE_NO');
                    if (vehicleInput) {
                        const vehicleDatalist = document.createElement('datalist');
                        vehicleDatalist.id = 'vehicleList';
                        vehicles.forEach(v => {
                            const option = document.createElement('option');
                            option.value = v;
                            vehicleDatalist.appendChild(option);
                        });
                        document.body.appendChild(vehicleDatalist);
                        vehicleInput.setAttribute('list', 'vehicleList');
                        vehicleInput.setAttribute('placeholder', 'Type or select vehicle (e.g., MH 12 AB 1234)');
                    }
                }
                
                if (drivers.length > 0) {
                    const driverInput = document.getElementById('update_DRIVER_NAME');
                    if (driverInput) {
                        const driverDatalist = document.createElement('datalist');
                        driverDatalist.id = 'driverList';
                        drivers.forEach(d => {
                            const option = document.createElement('option');
                            option.value = d;
                            driverDatalist.appendChild(option);
                        });
                        document.body.appendChild(driverDatalist);
                        driverInput.setAttribute('list', 'driverList');
                    }
                }
                
                // Date validation - disable future dates
                const dateInput = document.getElementById('update_DATE');
                if (dateInput) {
                    const today = new Date().toISOString().split('T')[0];
                    dateInput.setAttribute('max', today);
                    dateInput.addEventListener('change', function() { validateDate(this); });
                }
                
                const openingKM = document.getElementById('update_OPENING_KM');
                const closingKM = document.getElementById('update_CLOSING_KM');
                const mileage = document.getElementById('update_MILEAGE');
                const rate = document.getElementById('update_CNG_OR_DIESEL_RATE');
                const amount = document.getElementById('update_AMOUNT');
                const lul = document.getElementById('update_L_and_UL');
				const TripAdv = document.getElementById('update_TRIP_ADVANCE');
                const driverBata = document.getElementById('update_DRIVER_BATA');
                const otherExp = document.getElementById('update_OTHER_EXP');
                const actualIndent = document.getElementById('update_ACTUAL_INDENT');
                
                const calcFields = [openingKM, closingKM, mileage, rate, amount, lul, TripAdv, driverBata, otherExp, actualIndent];
                calcFields.forEach(field => {
                    if(field) { field.addEventListener('input', calculateAllFields); field.addEventListener('change', calculateAllFields); }
                });
                
                handleMileageChange();
                calculateAllFields();
                
                document.getElementById('updateSubmitBtn').addEventListener('click', handleUpdateTrip);
                goToPage2();
            } catch(err) {
                showAlert('Error loading update form: ' + err.message, 'error');
            } finally {
                hideLoading();
            }
        }

        async function handleUpdateTrip() {
            showLoading();
            try {
                const fd = new FormData();
                fd.append('spreadsheetId', SPREADSHEET_ID);
                fd.append('sheetName', SPREADSHEET_NAME);
                fd.append('action', 'update');
                fd.append('rowIndex', currentRowIndex);
                fd.append('driveFolderId', DRIVE_FOLDER_ID);
                
                const fieldNames = ['DATE','LR NO','VEHICLE NO','DRIVER NAME','MILEAGE','DESTINATION','OPENING KM','CLOSING KM','KM','CNG OR DIESEL RATE','AMOUNT','TRIP ADVANCE','L and UL','DRIVER BATA','OTHER EXP','TOTAL AMOUNT','ACTUAL INDENT','OTHER EXP REMARKS','POD STATUS','NOTE','DRIVER DIFFERENCE AMOUNT'];
                for(let f of fieldNames) {
                    const safeId = f.replace(/[&\s]/g, '_').replace(/_+/g, '_');
                    const el = document.getElementById(`update_${safeId}`);
                    if(el) fd.append(f, el.value);
                }
                
                const fileInput = document.getElementById('update_file');
                if(fileInput && fileInput.files && fileInput.files[0]) {
                    const file = fileInput.files[0];
                    const reader = new FileReader();
                    const base64 = await new Promise(resolve => { reader.onload = e => resolve(e.target.result.split(',')[1]); reader.readAsDataURL(file); });
                    fd.append('fileData1', base64);
                    fd.append('fileName1', file.name);
                    fd.append('fileType1', file.type);
                    fd.append('fileColumn1', 'FILE');
                    fd.append('fileCount', '1');
                } else {
                    const existing = document.getElementById('existingFile')?.value;
                    if(existing) fd.append('FILE', existing);
                    fd.append('fileCount', '0');
                }
                
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                const result = await res.json();
                if(result.status === 'success') {
                    showAlert('✅ Trip updated successfully!', 'success');
                    setTimeout(() => { goToPage1(); loadTrips(); }, 1500);
                } else throw new Error(result.message);
            } catch(err) { showAlert('Error: '+err.message, 'error'); }
            finally { hideLoading(); }
        }

        function openAddTripModal() {
            const modal = document.getElementById('addTripModal');
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            const iframe = document.getElementById('tripFormIframe');
            if(iframe) iframe.src = iframe.src;
        }
        
        function closeAddTripModal() { 
            document.getElementById('addTripModal').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
        }

        function goToPage1() { document.getElementById('page1').classList.add('active'); document.getElementById('page2').classList.remove('active'); loadTrips(); }
        function goToPage2() { document.getElementById('page1').classList.remove('active'); document.getElementById('page2').classList.add('active'); window.scrollTo(0,0); }
        function closeModal() { document.getElementById('viewModal').style.display = 'none'; document.body.style.overflow = 'auto'; currentTrip = null; }
        function showLoading() { document.getElementById('loading').classList.add('active'); }
        function hideLoading() { document.getElementById('loading').classList.remove('active'); }
        
        function showAlert(msg, type) {
            const alertModal = document.getElementById('alertModal');
            const header = document.getElementById('alertHeader');
            const msgDiv = document.getElementById('alertMessage');
            header.className = 'alert-header ' + type;
            header.innerHTML = type==='success'?'✅ Success!':(type==='error'?'❌ Error!':'⚠️ Warning!');
            msgDiv.innerHTML = msg;
            alertModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            if(type === 'success') setTimeout(() => closeAlertModal(), 2000);
        }
        
        function showAlertWithCallback(msg, type, callback) {
            const alertModal = document.getElementById('alertModal');
            const header = document.getElementById('alertHeader');
            const msgDiv = document.getElementById('alertMessage');
            const footer = document.querySelector('#alertModal .alert-footer');
            header.className = 'alert-header ' + type;
            header.innerHTML = type==='success'?'✅ Success!':(type==='error'?'❌ Error!':'⚠️ Warning!');
            msgDiv.innerHTML = msg;
            footer.innerHTML = `<button class="alert-btn" style="background:#e74c3c;" onclick="executeCallbackAndClose()">Delete</button><button class="alert-btn" onclick="closeAlertModal()">Cancel</button>`;
            window.pendingCallback = callback;
            alertModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        
        window.executeCallbackAndClose = function() {
            closeAlertModal();
            if(window.pendingCallback) window.pendingCallback();
            delete window.pendingCallback;
        };
        
        function closeAlertModal() {
            document.getElementById('alertModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            const footer = document.querySelector('#alertModal .alert-footer');
            footer.innerHTML = `<button class="alert-btn" onclick="closeAlertModal()">OK</button>`;
        }
        
        window.onclick = function(e) {
            if(e.target === document.getElementById('viewModal')) closeModal();
            if(e.target === document.getElementById('addTripModal')) closeAddTripModal();
            if(e.target === document.getElementById('alertModal')) closeAlertModal();
        };
        
        document.getElementById('searchInput').addEventListener('input', function(e) { performSearch(e.target.value); });
        window.onload = () => loadTrips();
    </script>
</body>
